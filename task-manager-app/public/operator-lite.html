<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Operatore - Molino Briganti</title>
    <style>
        /* CSS compatibile con browser vecchi - OTTIMIZZATO PER TABLET 10" */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-size: 22px;
            line-height: 1.5;
        }
        
        /* Header - GRANDE E LEGGIBILE - FISSO */
        .header {
            background-color: #2d2d2d;
            padding: 15px 25px;
            border-bottom: 3px solid #ea580c;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }
        
        .header h1 {
            font-size: 28px;
            color: #fff;
            margin: 0;
            display: inline-block;
        }
        
        .header .user-info {
            float: right;
            font-size: 20px;
            color: #fff;
            padding-top: 4px;
        }
        
        .header .logout-btn {
            background-color: #dc2626;
            color: #fff;
            border: none;
            padding: 14px 20px;
            font-size: 18px;
            cursor: pointer;
            margin-left: 15px;
            border-radius: 6px;
        }
        
        .clear {
            clear: both;
        }
        
        /* Operatore loggato - GRANDE E CENTRATO - FISSO */
        .user-display-large {
            background-color: #334155;
            color: #fff;
            text-align: center;
            padding: 20px 20px;
            font-size: 28px;
            font-weight: bold;
            position: fixed;
            top: 110px;
            left: 0;
            right: 0;
            z-index: 99;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .user-display-large .left-section {
            font-size: 24px;
            color: #ea580c;
        }
        
        .user-display-large .center-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-display-large .user-icon {
            font-size: 36px;
            margin-right: 15px;
        }
        
        .user-display-large .online {
            color: #22c55e;
            font-weight: bold;
        }
        
        .user-display-large .offline {
            color: #dc2626;
            font-weight: bold;
        }
        
        /* Container - LARGHEZZA PIENA */
        .container {
            padding: 20px;
            padding-top: 210px;
            max-width: 100%;
            margin: 0 auto;
        }
        
        /* Status bar */
        .status-bar {
            background-color: #2d2d2d;
            padding: 18px 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-size: 20px;
            text-align: center;
        }
        
        .status-bar .online {
            color: #22c55e;
            font-size: 22px;
        }
        
        .status-bar .offline {
            color: #dc2626;
            font-size: 22px;
        }
        
        .status-bar .last-update {
            color: #888;
            font-size: 18px;
            margin-top: 8px;
        }
        
        /* Section title */
        .section-title {
            font-size: 24px;
            color: #ea580c;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 2px solid #3d3d3d;
        }
        
        /* Task card - PIU' GRANDE E LEGGIBILE */
        .task-card {
            background-color: #2d2d2d;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 18px;
            border-left: 6px solid #8b5cf6;
        }
        
        .task-card.accepted {
            border-left-color: #3b82f6;
        }
        
        .task-card.paused {
            border-left-color: #f59e0b;
        }
        
        .task-card.completed {
            border-left-color: #22c55e;
            opacity: 0.7;
        }
        
        .task-title {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 12px;
        }
        
        .task-meta {
            font-size: 18px;
            color: #a0a0a0;
            margin-bottom: 8px;
        }
        
        .task-status {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .task-status.pending {
            background-color: #8b5cf6;
            color: #fff;
        }
        
        .task-status.accepted {
            background-color: #3b82f6;
            color: #fff;
        }
        
        .task-status.paused {
            background-color: #f59e0b;
            color: #fff;
        }
        
        .task-status.completed {
            background-color: #22c55e;
            color: #fff;
        }
        
        /* Buttons - GRANDI PER TOUCH */
        .btn-container {
            margin-top: 18px;
        }
        
        .btn {
            display: inline-block;
            padding: 18px 28px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-right: 12px;
            margin-bottom: 12px;
            min-width: 140px;
            text-align: center;
        }
        
        .btn-accept {
            background-color: #22c55e;
            color: #fff;
        }
        
        .btn-complete {
            background-color: #3b82f6;
            color: #fff;
        }
        
        .btn-pause {
            background-color: #f59e0b;
            color: #fff;
        }
        
        .btn-resume {
            background-color: #8b5cf6;
            color: #fff;
        }
        
        .btn:active {
            opacity: 0.8;
        }
        
        .btn:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
        }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 30px;
            color: #888;
            font-size: 22px;
        }
        
        .empty-state .icon {
            font-size: 72px;
            margin-bottom: 20px;
        }
        
        /* Login form - PIU' GRANDE */
        .login-container {
            max-width: 500px;
            margin: 60px auto;
            padding: 40px;
            background-color: #2d2d2d;
            border-radius: 15px;
        }
        
        .login-container h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #ea580c;
            font-size: 32px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 12px;
            color: #e0e0e0;
            font-size: 20px;
        }
        
        .form-group input {
            width: 100%;
            padding: 18px;
            font-size: 22px;
            border: 2px solid #4d4d4d;
            border-radius: 8px;
            background-color: #1a1a1a;
            color: #fff;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #ea580c;
        }
        
        .btn-login {
            width: 100%;
            padding: 20px;
            background-color: #ea580c;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .error-msg {
            background-color: #dc2626;
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            font-size: 18px;
        }
        
        /* Timeline */
        .task-timeline {
            background-color: #252525;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 16px;
        }
        
        .task-timeline .timeline-title {
            color: #888;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 18px;
        }
        
        .task-timeline .timeline-item {
            color: #a0a0a0;
            margin: 6px 0;
        }
        
        /* Priority colors */
        .priority-low { color: #10B981; }
        .priority-medium { color: #FCD34D; }
        .priority-high { color: #F97316; }
        .priority-urgent { color: #EF4444; }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 30px;
            color: #888;
            font-size: 22px;
        }
        
        /* Refresh button - PIU' GRANDE */
        .refresh-btn {
            background-color: #3d3d3d;
            color: #fff;
            border: none;
            padding: 16px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
        }
        
        .refresh-btn:active {
            background-color: #555;
        }
        
        /* Operator buttons grid */
        .operator-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .operator-btn {
            padding: 25px 20px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: #fff;
            transition: transform 0.1s, opacity 0.1s;
        }
        
        .operator-btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }
        
        .operator-btn.color-0 { background-color: #ea580c; }
        .operator-btn.color-1 { background-color: #2563eb; }
        .operator-btn.color-2 { background-color: #16a34a; }
        .operator-btn.color-3 { background-color: #8b5cf6; }
        .operator-btn.color-4 { background-color: #dc2626; }
        .operator-btn.color-5 { background-color: #0891b2; }
        .operator-btn.color-6 { background-color: #ca8a04; }
        .operator-btn.color-7 { background-color: #be185d; }
        
        .loading-operators {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 20px;
        }
        
        /* Logo e nome azienda */
        .company-branding {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .company-branding img {
            max-width: 250px;
            max-height: 140px;
            margin: 0 auto 15px auto;
            display: block;
        }
        
        /* Logo header dashboard */
        .header-logo {
            display: inline-block;
            vertical-align: middle;
            margin-right: 15px;
        }
        
        .header-logo img {
            max-height: 80px;
            vertical-align: middle;
        }
    </style>
    <script src="js/settings-utils.js"></script>
</head>
<body>
    
    <!-- Login Section -->
    <div id="loginSection">
        <div class="login-container">
            <div class="company-branding">
                <img id="loginLogo" src="images/logo INSEGNA.png" alt="Logo Azienda" style="display: none;">
            </div>
            <p style="text-align: center; color: #888; margin-bottom: 20px; font-size: 20px;">Seleziona il tuo nome:</p>
            <div id="operatorGrid" class="operator-grid">
                <div class="loading-operators">Caricamento operatori...</div>
            </div>
            <p id="version-op-lite" style="text-align: center; margin-top: 30px; font-size: 18px; color: #666;">Versione Lite v1.0.19</p>
        </div>
    </div>
    
    <!-- Dashboard Section -->
    <div id="dashboardSection" style="display: none;">
        <div class="header">
            <span class="header-logo"><img id="dashboardLogo" src="images/logo INSEGNA.png" alt="Logo"></span>
            <span id="currentDateTime" style="color: #fff; font-size: 24px; font-weight: bold; margin-left: 20px; vertical-align: middle;"></span>
            <div class="user-info" style="display: flex; align-items: flex-start;">
                <div style="text-align: center; margin-right: 10px;">
                    <button class="refresh-btn" onclick="loadTasks()">🔄 Aggiorna</button>
                    <div style="color: #888; font-size: 12px; margin-top: 4px;">Agg: <span id="lastUpdate">--:--</span></div>
                </div>
                <div style="text-align: center;">
                    <button class="logout-btn" onclick="handleLogout()">🚪 Esci</button>
                    <div id="logoutCountdown" style="color: #f59e0b; font-size: 12px; margin-top: 4px;">Logout: 1:40</div>
                </div>
            </div>
            <div class="clear"></div>
        </div>
        
        <!-- OPERATORE LOGGATO - GRANDE E CENTRATO -->
        <div class="user-display-large">
            <div class="left-section">📅 Task di Oggi</div>
            <div class="center-section">
                <span class="user-icon">👷</span>
                <span id="userDisplay"></span>
                <span id="connectionStatus" class="online">● Online</span>
            </div>
            <div style="width: 150px;"></div>
        </div>
        
        <div class="container">
            
            <div id="tasksList">
                <div class="loading">Caricamento...</div>
            </div>
        </div>
    </div>
    
    <script>
        // Configurazione - ES5 compatibile
        var API_URL = window.location.protocol + '//' + window.location.hostname + ':' + (window.location.port || 5000) + '/api';
        var token = null;
        var currentUser = null;
        var tasks = [];
        var refreshInterval = null;
        var inactivityTimeout = null;
        var countdownInterval = null;
        var visibleCountdownInterval = null;
        var logoutTimeRemaining = 100; // secondi totali (90s inattività + 10s countdown)
        var isCountdownActive = false;
        var INACTIVITY_TIME = 90000; // 1.5 minuti di inattività
        var COUNTDOWN_TIME = 10; // 10 secondi di countdown prima del logout
        
        // Carica impostazioni aziendali (logo e nome)
        function loadCompanySettings() {
            var xhr = new XMLHttpRequest();
            var timeoutId = null;
            
            // Timeout di 5 secondi per browser vecchi
            timeoutId = setTimeout(function() {
                xhr.abort();
                applyDefaultBranding();
            }, 5000);
            
            // Usa endpoint pubblico /company invece di / che richiede auth
            xhr.open('GET', API_URL + '/settings/company', true);
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    clearTimeout(timeoutId);
                    if (xhr.status === 200) {
                        try {
                            var settings = JSON.parse(xhr.responseText);
                            applyCompanyBranding(settings);
                        } catch(e) {
                            console.warn('Errore parsing impostazioni:', e);
                            applyDefaultBranding();
                        }
                    } else {
                        applyDefaultBranding();
                    }
                }
            };
            
            xhr.onerror = function() {
                clearTimeout(timeoutId);
                applyDefaultBranding();
            };
            
            try {
                xhr.send();
            } catch(e) {
                clearTimeout(timeoutId);
                applyDefaultBranding();
            }
        }
        
        // Fallback se API non disponibile
        function applyDefaultBranding() {
            var loginLogo = document.getElementById('loginLogo');
            var dashboardLogo = document.getElementById('dashboardLogo');
            
            // Mostra logo di default
            if (loginLogo) {
                loginLogo.src = 'images/logo INSEGNA.png';
                loginLogo.style.display = 'block';
            }
            if (dashboardLogo) {
                dashboardLogo.src = 'images/logo INSEGNA.png';
            }
        }
        
        function applyCompanyBranding(settings) {
            // Usa la versione globale da settings-utils.js se disponibile
            if (window.SettingsUtils && typeof window.SettingsUtils.applyBranding === 'function') {
                console.log('✅ Using global applyBranding from settings-utils.js');
                window.SettingsUtils.applyBranding(settings);
            }
            
            // Fallback per dashboardLogo (locale)
            var dashboardLogo = document.getElementById('dashboardLogo');
            if (settings && settings.logoUrl && dashboardLogo) {
                var logoSrc = settings.logoUrl;
                if (logoSrc && logoSrc.indexOf('http') !== 0 && logoSrc.indexOf('data:') !== 0) {
                    logoSrc = API_URL.replace('/api', '') + '/' + logoSrc;
                }
                dashboardLogo.src = logoSrc;
                console.log('✅ Dashboard logo updated (fallback):', logoSrc);
            } else if (dashboardLogo) {
                // Nessun logo configurato, usa default
                dashboardLogo.src = 'images/logo INSEGNA.png';
            }
            
            // Aggiorna titolo pagina
            if (settings && settings.businessName) {
                document.title = 'Operatore - ' + settings.businessName;
            }
        }
        
        // Aggiorna data e ora correnti
        function updateDateTime() {
            var now = new Date();
            var days = ['Dom', 'Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab'];
            var dayName = days[now.getDay()];
            var day = now.getDate();
            var month = now.getMonth() + 1;
            var hours = now.getHours();
            var minutes = now.getMinutes();
            
            // Formatta con zeri iniziali
            if (day < 10) day = '0' + day;
            if (month < 10) month = '0' + month;
            if (hours < 10) hours = '0' + hours;
            if (minutes < 10) minutes = '0' + minutes;
            
            var dateTimeStr = dayName + ' ' + day + '/' + month + ' - ' + hours + ':' + minutes;
            var el = document.getElementById('currentDateTime');
            if (el) {
                el.textContent = dateTimeStr;
            }
        }
        
        // Inizializzazione
        function init() {
            // Carica subito le impostazioni aziendali
            loadCompanySettings();
            
            // Avvia aggiornamento data/ora
            updateDateTime();
            setInterval(updateDateTime, 30000); // Aggiorna ogni 30 secondi
            
            token = localStorage.getItem('token');
            var userStr = localStorage.getItem('currentUser');
            if (userStr) {
                try {
                    currentUser = JSON.parse(userStr);
                } catch(e) {
                    currentUser = null;
                }
            }
            
            if (token && currentUser) {
                showDashboard();
                loadTasks();
                startAutoRefresh();
                startInactivityTimer();
            } else {
                showLogin();
                loadOperators();
            }
        }
        
        // Carica lista operatori
        function loadOperators() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', API_URL + '/auth/operators/public', true);
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        var operators = JSON.parse(xhr.responseText);
                        renderOperatorButtons(operators);
                    } else {
                        document.getElementById('operatorGrid').innerHTML = '<div class="loading-operators">Errore caricamento operatori</div>';
                    }
                }
            };
            
            xhr.onerror = function() {
                document.getElementById('operatorGrid').innerHTML = '<div class="loading-operators">Errore di connessione</div>';
            };
            
            xhr.send();
        }
        
        // Mostra pulsanti operatore
        function renderOperatorButtons(operators) {
            var grid = document.getElementById('operatorGrid');
            
            if (operators.length === 0) {
                grid.innerHTML = '<div class="loading-operators">Nessun operatore trovato</div>';
                return;
            }
            
            var html = '';
            for (var i = 0; i < operators.length; i++) {
                var op = operators[i];
                var colorClass = 'color-' + (i % 8);
                html += '<button class="operator-btn ' + colorClass + '" onclick="quickLogin(' + op.id + ', \'' + op.username + '\')">' +
                        '👷 ' + op.username +
                        '</button>';
            }
            grid.innerHTML = html;
        }
        
        // Login veloce senza password
        function quickLogin(operatorId, username) {
            var xhr = new XMLHttpRequest();
            xhr.open('POST', API_URL + '/auth/quick-login', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        var response = JSON.parse(xhr.responseText);
                        token = response.token;
                        currentUser = response.user;
                        localStorage.setItem('token', token);
                        localStorage.setItem('currentUser', JSON.stringify(currentUser));
                        showDashboard();
                        loadTasks();
                        startAutoRefresh();
                        startInactivityTimer();
                    } else {
                        alert('Errore di accesso');
                    }
                }
            };
            
            xhr.send(JSON.stringify({ operatorId: operatorId }));
        }
        
        function showLogin() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('dashboardSection').style.display = 'none';
            stopInactivityTimer();
            loadOperators();
        }
        
        function showDashboard() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'block';
            document.getElementById('userDisplay').textContent = currentUser ? currentUser.username : '';
        }
        
        // Aggiorna countdown visibile nell'header
        function updateVisibleCountdown() {
            var el = document.getElementById('logoutCountdown');
            if (!el) return;
            
            var mins = Math.floor(logoutTimeRemaining / 60);
            var secs = logoutTimeRemaining % 60;
            el.textContent = 'Logout: ' + mins + ':' + (secs < 10 ? '0' : '') + secs;
            
            // Cambia colore in base al tempo rimanente
            if (logoutTimeRemaining <= 10) {
                el.style.color = '#dc2626'; // Rosso
            } else if (logoutTimeRemaining <= 30) {
                el.style.color = '#f59e0b'; // Arancione
            } else {
                el.style.color = '#22c55e'; // Verde
            }
        }
        
        // Inactivity timer
        function startInactivityTimer() {
            isCountdownActive = false;
            logoutTimeRemaining = 100; // Reset a 1:40 (90s + 10s)
            updateVisibleCountdown();
            
            // Avvia countdown visibile ogni secondo
            if (visibleCountdownInterval) clearInterval(visibleCountdownInterval);
            visibleCountdownInterval = setInterval(function() {
                if (logoutTimeRemaining > 0) {
                    logoutTimeRemaining--;
                    updateVisibleCountdown();
                    
                    if (logoutTimeRemaining <= 0) {
                        handleLogout();
                    }
                }
            }, 1000);
            
            // Aggiungi listener per attività utente
            document.addEventListener('touchstart', onUserActivity, true);
            document.addEventListener('touchmove', onUserActivity, true);
            document.addEventListener('click', onUserActivity, true);
            document.addEventListener('scroll', onUserActivity, true);
            document.addEventListener('keydown', onUserActivity, true);
        }
        
        function stopInactivityTimer() {
            if (inactivityTimeout) clearTimeout(inactivityTimeout);
            if (countdownInterval) clearInterval(countdownInterval);
            if (visibleCountdownInterval) clearInterval(visibleCountdownInterval);
            isCountdownActive = false;
            document.removeEventListener('touchstart', onUserActivity, true);
            document.removeEventListener('touchmove', onUserActivity, true);
            document.removeEventListener('click', onUserActivity, true);
            document.removeEventListener('scroll', onUserActivity, true);
            document.removeEventListener('keydown', onUserActivity, true);
        }
        
        function onUserActivity() {
            // Reset countdown al tocco
            logoutTimeRemaining = 100; // Reset a 1:40
            updateVisibleCountdown();
        }
        
        // Logout
        function handleLogout() {
            localStorage.removeItem('token');
            localStorage.removeItem('currentUser');
            token = null;
            currentUser = null;
            stopAutoRefresh();
            stopInactivityTimer();
            showLogin();
        }
        
        // Load tasks
        function loadTasks() {
            if (!token) return;
            // Non resettare il timer qui - solo le interazioni utente devono resettarlo
            
            var xhr = new XMLHttpRequest();
            xhr.open('GET', API_URL + '/tasks', true);
            xhr.setRequestHeader('Authorization', 'Bearer ' + token);
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        tasks = JSON.parse(xhr.responseText);
                        renderTasks();
                        updateLastRefresh();
                        setConnectionStatus(true);
                    } else if (xhr.status === 401) {
                        handleLogout();
                    } else {
                        setConnectionStatus(false);
                    }
                }
            };
            
            xhr.onerror = function() {
                setConnectionStatus(false);
            };
            
            xhr.send();
        }
        
        // Render tasks
        function renderTasks() {
            var container = document.getElementById('tasksList');
            
            // Filtra task di oggi assegnati a me
            var today = new Date();
            var todayStr = today.getFullYear() + '-' + 
                          padZero(today.getMonth() + 1) + '-' + 
                          padZero(today.getDate());
            
            var myTasks = [];
            for (var i = 0; i < tasks.length; i++) {
                var task = tasks[i];
                if (task.assignedOperatorId === currentUser.id || 
                    (task.assignedOperator && task.assignedOperator.id === currentUser.id)) {
                    if (task.scheduledAt) {
                        var taskDate = task.scheduledAt.split('T')[0];
                        if (taskDate === todayStr) {
                            myTasks.push(task);
                        }
                    }
                }
            }
            
            if (myTasks.length === 0) {
                container.innerHTML = '<div class="empty-state">' +
                    '<div class="icon">✅</div>' +
                    '<p>Nessun task assegnato per oggi</p>' +
                    '</div>';
                return;
            }
            
            var html = '';
            for (var j = 0; j < myTasks.length; j++) {
                html += renderTaskCard(myTasks[j]);
            }
            container.innerHTML = html;
        }
        
        function renderTaskCard(task) {
            var statusClass = 'pending';
            var statusText = '📋 In Sospeso';
            var cardClass = '';
            
            if (task.completed) {
                statusClass = 'completed';
                statusText = '✅ Completato';
                cardClass = 'completed';
            } else if (task.paused) {
                statusClass = 'paused';
                statusText = '⏸️ In Pausa';
                cardClass = 'paused';
            } else if (task.acceptedAt) {
                statusClass = 'accepted';
                statusText = '👍 Accettato';
                cardClass = 'accepted';
            }
            
            var priorityClass = 'priority-medium';
            var priorityText = '🟡 Media';
            if (task.priority === 'LOW') {
                priorityClass = 'priority-low';
                priorityText = '🟢 Bassa';
            } else if (task.priority === 'HIGH') {
                priorityClass = 'priority-high';
                priorityText = '🟠 Alta';
            } else if (task.priority === 'URGENT') {
                priorityClass = 'priority-urgent';
                priorityText = '🔴 Urgente';
            }
            
            var buttons = '';
            
            if (!task.completed) {
                if (!task.acceptedAt) {
                    buttons += '<button class="btn btn-accept" onclick="acceptTask(' + task.id + ')">👍 Accetta</button>';
                } else if (task.paused) {
                    buttons += '<button class="btn btn-resume" onclick="resumeTask(' + task.id + ')">▶️ Riprendi</button>';
                } else {
                    buttons += '<button class="btn btn-complete" onclick="completeTask(' + task.id + ')">✅ Completa</button>';
                    buttons += '<button class="btn btn-pause" onclick="pauseTask(' + task.id + ')">⏸️ Pausa</button>';
                }
            }
            
            // Timeline
            var timeline = '<div class="task-timeline">';
            timeline += '<div class="timeline-title">📜 Storico:</div>';
            if (task.createdAt) {
                timeline += '<div class="timeline-item">📝 Creato: ' + formatDateTime(task.createdAt) + '</div>';
            }
            if (task.assignedAt) {
                timeline += '<div class="timeline-item">👤 Assegnato: ' + formatDateTime(task.assignedAt) + '</div>';
            }
            if (task.acceptedAt) {
                timeline += '<div class="timeline-item">👍 Accettato: ' + formatDateTime(task.acceptedAt) + '</div>';
            }
            if (task.pausedAt && task.paused) {
                timeline += '<div class="timeline-item">⏸️ In Pausa: ' + formatDateTime(task.pausedAt) + '</div>';
            }
            if (task.completedAt) {
                timeline += '<div class="timeline-item">✅ Completato: ' + formatDateTime(task.completedAt) + '</div>';
            }
            timeline += '</div>';
            
            var html = '<div class="task-card ' + cardClass + '">';
            html += '<div class="task-title">' + escapeHtml(task.title) + '</div>';
            html += '<span class="task-status ' + statusClass + '">' + statusText + '</span>';
            
            if (task.description) {
                html += '<div class="task-meta">📝 ' + escapeHtml(task.description) + '</div>';
            }
            if (task.estimatedMinutes) {
                html += '<div class="task-meta">⏱️ ' + task.estimatedMinutes + ' min</div>';
            }
            html += '<div class="task-meta ' + priorityClass + '">' + priorityText + '</div>';
            
            html += timeline;
            
            if (buttons) {
                html += '<div class="btn-container">' + buttons + '</div>';
            }
            
            html += '</div>';
            
            return html;
        }
        
        // Task actions
        function acceptTask(taskId) {
            sendTaskAction(taskId, 'accept');
        }
        
        function pauseTask(taskId) {
            sendTaskAction(taskId, 'pause');
        }
        
        function resumeTask(taskId) {
            sendTaskAction(taskId, 'resume');
        }
        
        function completeTask(taskId) {
            if (confirm('Confermi di aver completato questo task?')) {
                sendTaskAction(taskId, 'complete');
            }
        }
        
        function sendTaskAction(taskId, action) {
            var xhr = new XMLHttpRequest();
            
            if (action === 'complete') {
                xhr.open('PUT', API_URL + '/tasks/' + taskId, true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.setRequestHeader('Authorization', 'Bearer ' + token);
                
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            loadTasks();
                        } else {
                            alert('Errore durante l\'operazione');
                        }
                    }
                };
                
                xhr.send(JSON.stringify({ completed: true }));
            } else {
                xhr.open('POST', API_URL + '/tasks/' + taskId + '/' + action, true);
                xhr.setRequestHeader('Authorization', 'Bearer ' + token);
                
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            loadTasks();
                        } else {
                            alert('Errore durante l\'operazione');
                        }
                    }
                };
                
                xhr.send();
            }
        }
        
        // Utility functions
        function padZero(num) {
            return num < 10 ? '0' + num : '' + num;
        }
        
        function formatDateTime(dateStr) {
            if (!dateStr) return '--';
            var d = new Date(dateStr);
            return padZero(d.getDate()) + '/' + 
                   padZero(d.getMonth() + 1) + '/' + 
                   d.getFullYear() + ' ' + 
                   padZero(d.getHours()) + ':' + 
                   padZero(d.getMinutes());
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }
        
        function updateLastRefresh() {
            var now = new Date();
            document.getElementById('lastUpdate').textContent = 
                padZero(now.getHours()) + ':' + padZero(now.getMinutes()) + ':' + padZero(now.getSeconds());
        }
        
        function setConnectionStatus(online) {
            var elem = document.getElementById('connectionStatus');
            if (online) {
                elem.className = 'online';
                elem.textContent = '● Online';
            } else {
                elem.className = 'offline';
                elem.textContent = '● Offline';
            }
        }
        
        // Auto refresh ogni 5 secondi
        function startAutoRefresh() {
            stopAutoRefresh();
            refreshInterval = setInterval(loadTasks, 5000);
        }
        
        function stopAutoRefresh() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
                refreshInterval = null;
            }
        }
        
        // Start app
        init();
    </script>
</body>
</html>
