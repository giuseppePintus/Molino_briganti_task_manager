<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Clienti - Molino Briganti</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/common-styles.css">
    <link rel="stylesheet" href="css/customers-management-custom.css">
</head>
<body>
    <div class="container">
        <div class="sticky-top-bar">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div class="header-logo">
                    <img src="images/logo INSEGNA.png" alt="Molino Briganti Logo" class="logo-hidden">
                </div>
                <div class="header-title">
                    <h1>👥 Gestione Clienti</h1>
                    <div class="user-info" id="userInfo"></div>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-danger" data-icon="🚪" onclick="handleLogout()"><span>Logout</span></button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="number">0</div>
                <div class="label">Totale Clienti</div>
            </div>
            <div class="stat-card" style="border-left-color: #0891b2;">
                <div class="number">0</div>
                <div class="label">Con Orari</div>
            </div>
            <div class="stat-card" style="border-left-color: #7c3aed;">
                <div class="number">0</div>
                <div class="label">Città</div>
            </div>
            <div class="stat-card" style="border-left-color: #16a34a;">
                <div class="number">0</div>
                <div class="label">Con Email</div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
            <div class="dropdown-menu-admin">
                <button class="btn btn-settings" data-icon="⚙️" onclick="toggleAdminMenu()"><span>Gestione</span></button>
                <div id="adminMenuDropdown" class="admin-menu-dropdown">
                    <button class="admin-menu-item" onclick="openCustomerModal(); toggleAdminMenu();">
                        <span class="menu-icon">➕</span>
                        <span>Nuovo Cliente</span>
                    </button>
                    <button class="admin-menu-item" onclick="window.location.href='company-settings.html'; toggleAdminMenu();">
                        <span class="menu-icon">🏢</span>
                        <span>Impostazioni Azienda</span>
                    </button>
                    <button class="admin-menu-item" onclick="window.location.href='operators.html'; toggleAdminMenu();">
                        <span class="menu-icon">👥</span>
                        <span>Gestione Admin / Operatori</span>
                    </button>
                    <button class="admin-menu-item" onclick="window.location.href='backup-management.html'; toggleAdminMenu();">
                        <span class="menu-icon">💾</span>
                        <span>Gestione Backup</span>
                    </button>
                    <button class="admin-menu-item" onclick="openIndiceModal(); toggleAdminMenu();">
                        <span class="menu-icon">🗂️</span>
                        <span>Indice</span>
                    </button>
                </div>
            </div>
            <button class="btn btn-customers active" data-icon="👨‍💼" onclick="window.location.href='customers-management.html'"><span>Gestione Clienti</span></button>
            <button class="btn btn-tasks" data-icon="✅" onclick="window.location.href='admin-dashboard.html'"><span>Planner Task</span></button>
            <button class="btn btn-planner" data-icon="📦" onclick="window.location.href='orders-planner.html'"><span>Planner Ordini</span></button>
            <button class="btn btn-warehouse" data-icon="🏭" onclick="window.location.href='warehouse-management.html'"><span>Gestione Magazzino</span></button>
        </div>
        </div><!-- /.sticky-top-bar -->

        <!-- Customers List -->
        <div class="card">
            <h2>📋 Clienti</h2>
            <div class="customers-grid" id="customersGrid">
                <!-- Customers will be populated here -->
            </div>
        </div>
    </div>

    <!-- Customer Modal -->
    <div id="customerModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">📝 Nuovo Cliente</h2>
            <form id="customerForm" onsubmit="saveCustomer(event)">
                <div class="form-group">
                    <label for="customerName">Nome Azienda *</label>
                    <input type="text" id="customerName" required placeholder="Es. Azienda XYZ">
                </div>
                <div class="form-group">
                    <label for="customerEmail">Email *</label>
                    <input type="email" id="customerEmail" required placeholder="Es. info@azienda.it">
                </div>
                <div class="form-group">
                    <label for="customerPhone">Telefono *</label>
                    <input type="tel" id="customerPhone" required placeholder="Es. 0123456789">
                </div>
                <div class="form-group">
                    <label for="customerAddress">Indirizzo *</label>
                    <input type="text" id="customerAddress" required placeholder="Es. Via Roma 123">
                </div>
                <div class="form-group">
                    <label for="customerCity">Città *</label>
                    <input type="text" id="customerCity" required placeholder="Es. Milano">
                </div>
                <div class="form-group">
                    <label>Orario Apertura Mattina *</label>
                    <div class="time-input-group">
                        <input type="time" id="customerOpenMorningStart" required placeholder="Es. 08:00" class="flex-1" onchange="syncDeliveryHours()">
                        <span class="time-separator">alle</span>
                        <input type="time" id="customerOpenMorningEnd" required placeholder="Es. 13:00" class="flex-1" onchange="syncDeliveryHours()">
                    </div>
                </div>
                <div class="form-group">
                    <label>Orario Apertura Pomeriggio (opzionale)</label>
                    <div class="time-input-group">
                        <input type="time" id="customerOpenAfternoonStart" placeholder="Es. 15:00" class="flex-1" onchange="syncDeliveryHours()">
                        <span class="time-separator">alle</span>
                        <input type="time" id="customerOpenAfternoonEnd" placeholder="Es. 19:00" class="flex-1" onchange="syncDeliveryHours()">
                    </div>
                </div>
                <div class="form-group">
                    <label>Finestra Consegne Mattina *</label>
                    <div class="time-input-group">
                        <input type="time" id="customerDeliveryMorningStart" required placeholder="Es. 08:00" class="flex-1">
                        <span class="time-separator">alle</span>
                        <input type="time" id="customerDeliveryMorningEnd" required placeholder="Es. 12:00" class="flex-1">
                    </div>
                </div>
                <div class="form-group">
                    <label>Finestra Consegne Pomeriggio (opzionale)</label>
                    <div class="time-input-group">
                        <input type="time" id="customerDeliveryAfternoonStart" placeholder="Es. 15:00" class="flex-1">
                        <span class="time-separator">alle</span>
                        <input type="time" id="customerDeliveryAfternoonEnd" placeholder="Es. 18:00" class="flex-1">
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary">💾 Salva</button>
                    <button type="button" class="btn btn-secondary" onclick="closeCustomerModal()">❌ Annulla</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Destinations Modal -->
    <div id="destinationsModal" class="modal">
        <div class="modal-content" style="max-width:680px;">
            <h2 id="destinationsModalTitle">📍 Destinazioni</h2>
            <div id="destinationsList" style="margin-bottom:16px;"></div>
            <div class="modal-actions" style="justify-content:space-between;">
                <button class="btn btn-customers" onclick="openDestinationForm(null)">➕ Aggiungi destinazione</button>
                <button class="btn btn-secondary" onclick="closeDestinationsModal()">✕ Chiudi</button>
            </div>
        </div>
    </div>

    <!-- Destination Form Modal -->
    <div id="destinationFormModal" class="modal">
        <div class="modal-content">
            <h2 id="destFormTitle">📍 Nuova Destinazione</h2>
            <form id="destinationForm" onsubmit="saveDestination(event)">
                <div class="form-group">
                    <label for="destLabel">Nome destinazione *</label>
                    <input type="text" id="destLabel" required placeholder="Es. Sede principale, Magazzino nord">
                </div>
                <div class="form-group">
                    <label for="destAddress">Indirizzo</label>
                    <input type="text" id="destAddress" placeholder="Es. Via Roma 123">
                </div>
                <div style="display:grid;grid-template-columns:1fr 80px 100px;gap:10px;">
                    <div class="form-group">
                        <label for="destCity">Città</label>
                        <input type="text" id="destCity" placeholder="Es. Milano">
                    </div>
                    <div class="form-group">
                        <label for="destProvince">Prov.</label>
                        <input type="text" id="destProvince" placeholder="MI" maxlength="2">
                    </div>
                    <div class="form-group">
                        <label for="destCap">CAP</label>
                        <input type="text" id="destCap" placeholder="20100">
                    </div>
                </div>
                <div class="form-group">
                    <label for="destPhone">Telefono</label>
                    <input type="tel" id="destPhone" placeholder="Es. 0123456789">
                </div>
                <div class="form-group">
                    <label>Orario apertura mattina</label>
                    <div class="time-input-group">
                        <input type="time" id="destOpenMorningStart" class="flex-1">
                        <span class="time-separator">alle</span>
                        <input type="time" id="destOpenMorningEnd" class="flex-1">
                    </div>
                </div>
                <div class="form-group">
                    <label>Orario apertura pomeriggio (opzionale)</label>
                    <div class="time-input-group">
                        <input type="time" id="destOpenAfternoonStart" class="flex-1">
                        <span class="time-separator">alle</span>
                        <input type="time" id="destOpenAfternoonEnd" class="flex-1">
                    </div>
                </div>
                <div class="form-group">
                    <label>Finestra consegne mattina</label>
                    <div class="time-input-group">
                        <input type="time" id="destDeliveryMorningStart" class="flex-1">
                        <span class="time-separator">alle</span>
                        <input type="time" id="destDeliveryMorningEnd" class="flex-1">
                    </div>
                </div>
                <div class="form-group">
                    <label>Finestra consegne pomeriggio (opzionale)</label>
                    <div class="time-input-group">
                        <input type="time" id="destDeliveryAfternoonStart" class="flex-1">
                        <span class="time-separator">alle</span>
                        <input type="time" id="destDeliveryAfternoonEnd" class="flex-1">
                    </div>
                </div>
                <div class="form-group">
                    <label for="destNotes">Note</label>
                    <textarea id="destNotes" rows="2" placeholder="Note aggiuntive..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary">💾 Salva</button>
                    <button type="button" class="btn btn-secondary" onclick="closeDestinationForm()">❌ Annulla</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/data-sync.js"></script>
    <script src="js/settings-utils.js"></script>
    <script src="js/pages-indice.js"></script>
    <script src="js/alerts-badge.js" defer></script>
    <script>
        const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');

        function handleLogout() {
            localStorage.removeItem('token');
            localStorage.removeItem('currentUser');
            window.location.href = '/index.html';
        }

        function toggleAdminMenu() {
            const dropdown = document.getElementById('adminMenuDropdown');
            if (!dropdown) return;
            if (dropdown.style.display === 'none' || dropdown.style.display === '') {
                dropdown.style.display = 'block';
            } else {
                dropdown.style.display = 'none';
            }
        }

        // Chiudi il menu quando si clicca fuori
        document.addEventListener('click', (event) => {
            const dropdown = document.getElementById('adminMenuDropdown');
            const gestButton = event.target.closest('.dropdown-menu-admin');
            if (dropdown && !gestButton) {
                dropdown.style.display = 'none';
            }
        });

        let customers = [];
        let editingCustomerId = null;

        function updateStats() {
            const total = customers.length;
            const withDelivery = customers.filter(c => c.orario_consegna_inizio && c.orario_consegna_fine).length;
            const cities = new Set(customers.map(c => c.città).filter(Boolean)).size;
            const withEmail = customers.filter(c => c.email && c.email.includes('@')).length;

            const el = document.getElementById('stats');
            if (!el) return;
            el.innerHTML = `
                <div class="stat-card">
                    <div class="number">${total}</div>
                    <div class="label">Totale Clienti</div>
                </div>
                <div class="stat-card" style="border-left-color: #0891b2;">
                    <div class="number">${withDelivery}</div>
                    <div class="label">Con Orari</div>
                </div>
                <div class="stat-card" style="border-left-color: #7c3aed;">
                    <div class="number">${cities}</div>
                    <div class="label">Città</div>
                </div>
                <div class="stat-card" style="border-left-color: #16a34a;">
                    <div class="number">${withEmail}</div>
                    <div class="label">Con Email</div>
                </div>
            `;
        }

        // Carica clienti da API/localStorage
        async function loadCustomers() {
            try {
                // Prima prova a caricare da API
                customers = await DataSync.loadCustomers();
                renderCustomers();
            } catch (error) {
                console.log('API non disponibile, carico da CSV...');
                try {
                    const response = await fetch('data/clienti.csv');
                    const text = await response.text();
                    const lines = text.trim().split('\n');
                    const headers = lines[0].split(',');
                    
                    customers = lines.slice(1).map(line => {
                        const values = line.split(',');
                        return {
                            id: values[0].trim(),
                            nome: values[1].trim(),
                            email: values[2].trim(),
                            telefono: values[3].trim(),
                            indirizzo: values[4].trim(),
                            città: values[5].trim(),
                            orario_apertura: values[6]?.trim() || '',
                            orario_chiusura: values[7]?.trim() || '',
                            orario_consegna_inizio: values[8]?.trim() || '',
                            orario_consegna_fine: values[9]?.trim() || '',
                            orari_split: values[6]?.includes('-') ? values[6].trim() : ''
                        };
                    });

                    renderCustomers();
                } catch (csvError) {
                    console.error('Errore caricamento clienti:', csvError);
                }
            }
        }

        // Renderizza clienti
        function renderCustomers() {
            const grid = document.getElementById('customersGrid');
            updateStats();

            if (customers.length === 0) {
                grid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;">Nessun cliente. Crea il primo cliente!</div>';
                return;
            }

            grid.innerHTML = customers.map(customer => {
                let orariDisplay = '';
                if (customer.orario_apertura && customer.orario_chiusura) {
                    orariDisplay = `<p>⏰ Apertura: ${customer.orario_apertura} - ${customer.orario_chiusura}</p>`;
                }
                if (customer.orario_consegna_inizio && customer.orario_consegna_fine) {
                    orariDisplay += `<p>🚚 Consegne: ${customer.orario_consegna_inizio} - ${customer.orario_consegna_fine}</p>`;
                }
                const destCount = (customer.destinations || []).length;
                const destBadge = destCount > 0 ? `<span class="dest-badge">📍 ${destCount} dest.</span>` : '';
                
                return `
                <div class="customer-card">
                    <h3>${customer.nome}${destBadge}</h3>
                    <div class="customer-info">
                        <p>📧 ${customer.email}</p>
                        <p>📞 ${customer.telefono}</p>
                        <p>📍 ${customer.indirizzo}</p>
                        <p>🏙️ ${customer.città}</p>
                        ${orariDisplay}
                    </div>
                    <div class="customer-actions">
                        <button class="btn btn-success" onclick="editCustomer(${customer.id})">✏️ Modifica</button>
                        <button class="btn btn-customers" onclick="openDestinationsModal(${customer.id})">📍 Destinazioni</button>
                        <button class="btn btn-danger" onclick="deleteCustomer(${customer.id})">🗑️ Elimina</button>
                    </div>
                </div>
            `}).join('');
        }

        // Sincronizza orari di consegna con orari di apertura
        function syncDeliveryHours() {
            const morningStart = document.getElementById('customerOpenMorningStart').value;
            const morningEnd = document.getElementById('customerOpenMorningEnd').value;
            const afternoonStart = document.getElementById('customerOpenAfternoonStart').value;
            const afternoonEnd = document.getElementById('customerOpenAfternoonEnd').value;
            
            // Sincronizza solo se i campi di consegna sono vuoti
            if (!document.getElementById('customerDeliveryMorningStart').value && morningStart) {
                document.getElementById('customerDeliveryMorningStart').value = morningStart;
            }
            if (!document.getElementById('customerDeliveryMorningEnd').value && morningEnd) {
                document.getElementById('customerDeliveryMorningEnd').value = morningEnd;
            }
            if (!document.getElementById('customerDeliveryAfternoonStart').value && afternoonStart) {
                document.getElementById('customerDeliveryAfternoonStart').value = afternoonStart;
            }
            if (!document.getElementById('customerDeliveryAfternoonEnd').value && afternoonEnd) {
                document.getElementById('customerDeliveryAfternoonEnd').value = afternoonEnd;
            }
        }

        // Apri modal nuovo cliente
        function openCustomerModal() {
            editingCustomerId = null;
            document.getElementById('modalTitle').textContent = '📝 Nuovo Cliente';
            document.getElementById('customerForm').reset();
            document.getElementById('customerModal').classList.add('active');
        }

        // Chiudi modal
        function closeCustomerModal() {
            document.getElementById('customerModal').classList.remove('active');
            editingCustomerId = null;
        }

        // Modifica cliente
        function editCustomer(id) {
            const customer = customers.find(c => c.id == id);
            if (!customer) return;

            editingCustomerId = id;
            document.getElementById('modalTitle').textContent = '✏️ Modifica Cliente';
            document.getElementById('customerName').value = customer.nome;
            document.getElementById('customerEmail').value = customer.email;
            document.getElementById('customerPhone').value = customer.telefono;
            document.getElementById('customerAddress').value = customer.indirizzo;
            document.getElementById('customerCity').value = customer.città;
            
            // Parse opening hours (format: "08:00" or stored separately)
            document.getElementById('customerOpenMorningStart').value = customer.orario_apertura || '';
            document.getElementById('customerOpenMorningEnd').value = customer.orario_chiusura || '';
            document.getElementById('customerOpenAfternoonStart').value = '';
            document.getElementById('customerOpenAfternoonEnd').value = '';
            
            // Parse delivery windows
            document.getElementById('customerDeliveryMorningStart').value = customer.orario_consegna_inizio || '';
            document.getElementById('customerDeliveryMorningEnd').value = customer.orario_consegna_fine || '';
            document.getElementById('customerDeliveryAfternoonStart').value = '';
            document.getElementById('customerDeliveryAfternoonEnd').value = '';
            document.getElementById('customerModal').classList.add('active');
        }

        // Salva cliente
        async function saveCustomer(event) {
            event.preventDefault();

            const morningStart = document.getElementById('customerOpenMorningStart').value;
            const morningEnd = document.getElementById('customerOpenMorningEnd').value;
            const afternoonStart = document.getElementById('customerOpenAfternoonStart').value;
            const afternoonEnd = document.getElementById('customerOpenAfternoonEnd').value;
            
            const deliveryMorningStart = document.getElementById('customerDeliveryMorningStart').value;
            const deliveryMorningEnd = document.getElementById('customerDeliveryMorningEnd').value;
            const deliveryAfternoonStart = document.getElementById('customerDeliveryAfternoonStart').value;
            const deliveryAfternoonEnd = document.getElementById('customerDeliveryAfternoonEnd').value;
            
            // Format: "08:00-13:00" or "08:00-13:00, 15:00-19:00"
            let orarioDisplay = `${morningStart}-${morningEnd}`;
            if (afternoonStart && afternoonEnd) {
                orarioDisplay += `, ${afternoonStart}-${afternoonEnd}`;
            }
            
            let deliveryDisplay = `${deliveryMorningStart}-${deliveryMorningEnd}`;
            if (deliveryAfternoonStart && deliveryAfternoonEnd) {
                deliveryDisplay += `, ${deliveryAfternoonStart}-${deliveryAfternoonEnd}`;
            }
            
            const customerData = {
                id: editingCustomerId || Math.max(...customers.map(c => parseInt(c.id)), 0) + 1,
                nome: document.getElementById('customerName').value,
                email: document.getElementById('customerEmail').value,
                telefono: document.getElementById('customerPhone').value,
                indirizzo: document.getElementById('customerAddress').value,
                città: document.getElementById('customerCity').value,
                orario_apertura: morningStart,
                orario_chiusura: afternoonEnd || morningEnd,
                orario_display: orarioDisplay,
                orario_consegna_inizio: deliveryMorningStart,
                orario_consegna_fine: deliveryAfternoonEnd || deliveryMorningEnd,
                orario_consegna_display: deliveryDisplay
            };

            if (editingCustomerId) {
                // Modifica cliente esistente
                try {
                    await DataSync.updateCustomer(editingCustomerId, customerData);
                    const index = customers.findIndex(c => c.id == editingCustomerId);
                    if (index >= 0) {
                        customers[index] = { ...customers[index], ...customerData };
                    }
                } catch (error) {
                    if (error.status === 409) {
                        alert('❌ ' + error.message);
                        return;
                    }
                    console.warn('⚠️ Errore aggiornamento API, salvo localmente:', error);
                    const index = customers.findIndex(c => c.id == editingCustomerId);
                    if (index >= 0) {
                        customers[index] = customerData;
                    }
                }
            } else {
                // Nuovo cliente
                try {
                    const savedCustomer = await DataSync.saveCustomer(customerData);
                    customerData.id = savedCustomer.id || customerData.id;
                    customers.push({ ...savedCustomer, nome: savedCustomer.nome || savedCustomer.name || customerData.nome, ...customerData });
                } catch (error) {
                    if (error.status === 409) {
                        alert('❌ ' + error.message);
                        return;
                    }
                    console.warn('⚠️ Errore creazione API, salvo localmente:', error);
                    customers.push(customerData);
                }
            }

            // Backup in localStorage
            localStorage.setItem('customers', JSON.stringify(customers));
            renderCustomers();
            closeCustomerModal();
            alert('✅ Cliente salvato con successo!');
        }

        // Elimina cliente
        async function deleteCustomer(id) {
            try {
                await DataSync.deleteCustomer(id);
            } catch (error) {
                console.warn('⚠️ Errore eliminazione API:', error);
            }
            customers = customers.filter(c => c.id != id);
            localStorage.setItem('customers', JSON.stringify(customers));
            renderCustomers();
            alert('✅ Cliente eliminato!');
        }

        // Salva in localStorage/API
        async function saveToLocalStorage() {
            // Mantiene anche il localStorage per compatibilità
            localStorage.setItem('customers', JSON.stringify(customers));
        }

        // Carica da localStorage (fallback)
        async function loadFromLocalStorage() {
            try {
                customers = await DataSync.loadCustomers();
            } catch (error) {
                const stored = localStorage.getItem('customers');
                if (stored) {
                    customers = JSON.parse(stored);
                }
            }
        }

        // Torna indietro
        function goBack() {
            window.history.back();
        }

        // Inizializza
        window.addEventListener('load', async () => {
            // Popola userInfo (avatar + nome)
            renderUserInfoBadge('userInfo', currentUser);
            // Carica branding (logo, nome azienda)
            if (window.SettingsUtils && window.SettingsUtils.loadAndApplyBranding) {
                await window.SettingsUtils.loadAndApplyBranding();
            }
            await loadCustomers();
            renderCustomers();
        });

        // Sincronizza dati quando cambiano da un'altra pagina (storage event listener)
        window.addEventListener('storage', async (event) => {
            if (event.key === 'customers') {
                console.log('👥 Sincronizzando clienti da un\'altra pagina...');
                await loadFromLocalStorage();
                renderCustomers();
            }
        });

        // Global ESC key handler
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const customerModal = document.getElementById('customerModal');
                if (customerModal && customerModal.classList.contains('active')) { closeCustomerModal(); return; }
                const destFormModal = document.getElementById('destinationFormModal');
                if (destFormModal && destFormModal.classList.contains('active')) { closeDestinationForm(); return; }
                const destModal = document.getElementById('destinationsModal');
                if (destModal && destModal.classList.contains('active')) { closeDestinationsModal(); }
            }
        });

        // ============================================================
        // DESTINAZIONI MULTIPLE
        // ============================================================
        let currentDestinationsCustomerId = null;
        let editingDestinationId = null;

        function openDestinationsModal(customerId) {
            currentDestinationsCustomerId = customerId;
            const customer = customers.find(c => c.id == customerId);
            document.getElementById('destinationsModalTitle').textContent =
                `📍 Destinazioni — ${customer?.nome || customer?.name || ''}`;
            renderDestinationsList(customer);
            document.getElementById('destinationsModal').classList.add('active');
        }

        function closeDestinationsModal() {
            document.getElementById('destinationsModal').classList.remove('active');
            currentDestinationsCustomerId = null;
        }

        function buildDestHoursHtml(d) {
            let h = '';
            if (d.openMorningStart && d.openMorningEnd) {
                h += `<p>⏰ Apertura: ${d.openMorningStart}-${d.openMorningEnd}`;
                if (d.openAfternoonStart && d.openAfternoonEnd) h += `, ${d.openAfternoonStart}-${d.openAfternoonEnd}`;
                h += '</p>';
            }
            if (d.deliveryMorningStart && d.deliveryMorningEnd) {
                h += `<p>🚚 Consegne: ${d.deliveryMorningStart}-${d.deliveryMorningEnd}`;
                if (d.deliveryAfternoonStart && d.deliveryAfternoonEnd) h += `, ${d.deliveryAfternoonStart}-${d.deliveryAfternoonEnd}`;
                h += '</p>';
            }
            return h;
        }

        function renderDestinationsList(customer) {
            const list = document.getElementById('destinationsList');
            const destinations = customer?.destinations || [];

            // Destinazione di default ricavata dai dati della ragione sociale
            const defaultHours = buildDestHoursHtml({
                openMorningStart: customer?.orario_apertura || null,
                openMorningEnd: customer?.orario_chiusura || null,
                deliveryMorningStart: customer?.orario_consegna_inizio || null,
                deliveryMorningEnd: customer?.orario_consegna_fine || null
            });
            const defaultDestHtml = `
                <div class="dest-list-item" style="border-left-color:#16a34a;opacity:0.9;">
                    <h4 style="display:flex;align-items:center;gap:8px;">🏢 ${customer?.nome || customer?.name || 'Sede principale'} <span style="font-size:10px;background:#16a34a;color:white;border-radius:10px;padding:1px 7px;">default</span></h4>
                    <div class="customer-info">
                        ${customer?.indirizzo ? `<p>🏠 ${customer.indirizzo}${customer.città ? ', ' + customer.città : ''}</p>` : ''}
                        ${customer?.telefono ? `<p>📞 ${customer.telefono}</p>` : ''}
                        ${customer?.email ? `<p>📧 ${customer.email}</p>` : ''}
                        ${defaultHours}
                    </div>
                    <div style="margin-top:6px;font-size:11px;color:#808080;">Modifica tramite ✏️ Modifica cliente</div>
                </div>`;

            if (destinations.length === 0) {
                list.innerHTML = defaultDestHtml + '<div class="empty-state" style="margin-top:10px;">Nessuna destinazione aggiuntiva.</div>';
                return;
            }
            list.innerHTML = defaultDestHtml + destinations.map(d => {
                const hoursHtml = buildDestHoursHtml(d);
                return `
                <div class="dest-list-item">
                    <h4>📍 ${d.label}</h4>
                    <div class="customer-info">
                        ${d.address ? `<p>🏠 ${d.address}${d.city ? ', ' + d.city : ''}${d.province ? ' (' + d.province + ')' : ''}${d.cap ? ' - ' + d.cap : ''}</p>` : ''}
                        ${d.phone ? `<p>📞 ${d.phone}</p>` : ''}
                        ${hoursHtml}
                        ${d.notes ? `<p>📝 ${d.notes}</p>` : ''}
                    </div>
                    <div class="customer-actions" style="margin-top:8px;">
                        <button class="btn btn-success" onclick="openDestinationForm(${d.id})">✏️ Modifica</button>
                        <button class="btn btn-danger" onclick="removeDestination(${d.id})">🗑️ Elimina</button>
                    </div>
                </div>`;
            }).join('');
        }

        function openDestinationForm(destId) {
            editingDestinationId = destId;
            const customer = customers.find(c => c.id == currentDestinationsCustomerId);
            document.getElementById('destFormTitle').textContent = destId ? '✏️ Modifica Destinazione' : '📍 Nuova Destinazione';
            document.getElementById('destinationForm').reset();
            if (destId) {
                const dest = (customer?.destinations || []).find(d => d.id == destId);
                if (dest) {
                    document.getElementById('destLabel').value = dest.label || '';
                    document.getElementById('destAddress').value = dest.address || '';
                    document.getElementById('destCity').value = dest.city || '';
                    document.getElementById('destProvince').value = dest.province || '';
                    document.getElementById('destCap').value = dest.cap || '';
                    document.getElementById('destPhone').value = dest.phone || '';
                    document.getElementById('destOpenMorningStart').value = dest.openMorningStart || '';
                    document.getElementById('destOpenMorningEnd').value = dest.openMorningEnd || '';
                    document.getElementById('destOpenAfternoonStart').value = dest.openAfternoonStart || '';
                    document.getElementById('destOpenAfternoonEnd').value = dest.openAfternoonEnd || '';
                    document.getElementById('destDeliveryMorningStart').value = dest.deliveryMorningStart || '';
                    document.getElementById('destDeliveryMorningEnd').value = dest.deliveryMorningEnd || '';
                    document.getElementById('destDeliveryAfternoonStart').value = dest.deliveryAfternoonStart || '';
                    document.getElementById('destDeliveryAfternoonEnd').value = dest.deliveryAfternoonEnd || '';
                    document.getElementById('destNotes').value = dest.notes || '';
                }
            }
            document.getElementById('destinationFormModal').classList.add('active');
        }

        function closeDestinationForm() {
            document.getElementById('destinationFormModal').classList.remove('active');
            editingDestinationId = null;
        }

        async function saveDestination(event) {
            event.preventDefault();
            const customerId = currentDestinationsCustomerId;
            const destData = {
                label: document.getElementById('destLabel').value.trim(),
                address: document.getElementById('destAddress').value.trim() || null,
                city: document.getElementById('destCity').value.trim() || null,
                province: document.getElementById('destProvince').value.trim() || null,
                cap: document.getElementById('destCap').value.trim() || null,
                phone: document.getElementById('destPhone').value.trim() || null,
                openMorningStart: document.getElementById('destOpenMorningStart').value || null,
                openMorningEnd: document.getElementById('destOpenMorningEnd').value || null,
                openAfternoonStart: document.getElementById('destOpenAfternoonStart').value || null,
                openAfternoonEnd: document.getElementById('destOpenAfternoonEnd').value || null,
                deliveryMorningStart: document.getElementById('destDeliveryMorningStart').value || null,
                deliveryMorningEnd: document.getElementById('destDeliveryMorningEnd').value || null,
                deliveryAfternoonStart: document.getElementById('destDeliveryAfternoonStart').value || null,
                deliveryAfternoonEnd: document.getElementById('destDeliveryAfternoonEnd').value || null,
                notes: document.getElementById('destNotes').value.trim() || null
            };
            try {
                const token = localStorage.getItem('token');
                const headers = { 'Content-Type': 'application/json', ...(token ? { 'Authorization': `Bearer ${token}` } : {}) };
                let saved;
                if (editingDestinationId) {
                    const resp = await fetch(`/api/customers/${customerId}/destinations/${editingDestinationId}`, {
                        method: 'PUT', headers, body: JSON.stringify(destData)
                    });
                    if (!resp.ok) throw new Error('Errore salvataggio');
                    saved = await resp.json();
                } else {
                    const resp = await fetch(`/api/customers/${customerId}/destinations`, {
                        method: 'POST', headers, body: JSON.stringify(destData)
                    });
                    if (!resp.ok) throw new Error('Errore salvataggio');
                    saved = await resp.json();
                }
                // Aggiorna oggetto locale
                const custIndex = customers.findIndex(c => c.id == customerId);
                if (custIndex >= 0) {
                    if (!customers[custIndex].destinations) customers[custIndex].destinations = [];
                    if (editingDestinationId) {
                        const di = customers[custIndex].destinations.findIndex(d => d.id == editingDestinationId);
                        if (di >= 0) customers[custIndex].destinations[di] = saved;
                    } else {
                        customers[custIndex].destinations.push(saved);
                    }
                }
                closeDestinationForm();
                renderDestinationsList(customers.find(c => c.id == customerId));
                renderCustomers();
            } catch (error) {
                alert('❌ Errore salvataggio destinazione: ' + error.message);
            }
        }

        async function removeDestination(destId) {
            if (!await customConfirm('Eliminare questa destinazione?')) return;
            const customerId = currentDestinationsCustomerId;
            try {
                const token = localStorage.getItem('token');
                await fetch(`/api/customers/${customerId}/destinations/${destId}`, {
                    method: 'DELETE',
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
            } catch (e) { /* ignora errori di rete */ }
            const custIndex = customers.findIndex(c => c.id == customerId);
            if (custIndex >= 0 && customers[custIndex].destinations) {
                customers[custIndex].destinations = customers[custIndex].destinations.filter(d => d.id != destId);
            }
            renderDestinationsList(customers.find(c => c.id == customerId));
            renderCustomers();
        }
    </script>
    <script>
    (function() {
        var bar = document.querySelector('.sticky-top-bar');
        if (!bar) return;
        var locked = false;
        window.addEventListener('scroll', function() {
            if (locked) return;
            if (window.scrollY > 60 && !bar.classList.contains('scrolled')) {
                locked = true;
                bar.classList.add('scrolled');
                setTimeout(function() { locked = false; }, 400);
            } else if (window.scrollY <= 5 && bar.classList.contains('scrolled')) {
                locked = true;
                bar.classList.remove('scrolled');
                setTimeout(function() { locked = false; }, 400);
            }
        }, { passive: true });
    })();
    </script>
    <script src="js/user-info-badge.js"></script>
    <script src="js/header-overflow-menu.js"></script>
    <script src="js/ui-confirm.js"></script>
</body>
</html>
