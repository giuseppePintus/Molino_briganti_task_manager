<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Admin - Molino Briganti</title>
    <style>
        /* CSS compatibile con browser vecchi - no flexbox/grid avanzato */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-size: 16px;
            line-height: 1.4;
        }
        
        /* Header */
        .header {
            background-color: #2d2d2d;
            padding: 12px 15px;
            border-bottom: 2px solid #3b82f6;
            position: relative;
        }
        
        .header h1 {
            font-size: 18px;
            color: #fff;
            margin: 0;
            display: inline-block;
        }
        
        .header .user-info {
            float: right;
            font-size: 14px;
            color: #a0a0a0;
            padding-top: 2px;
        }
        
        .header .logout-btn {
            background-color: #dc2626;
            color: #fff;
            border: none;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            margin-left: 10px;
            border-radius: 4px;
        }
        
        .header .link-full {
            background-color: #6b7280;
            color: #fff;
            border: none;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            margin-left: 10px;
            border-radius: 4px;
            text-decoration: none;
        }
        
        .clear {
            clear: both;
        }
        
        /* Container */
        .container {
            padding: 15px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        /* Status bar */
        .status-bar {
            background-color: #2d2d2d;
            padding: 10px 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
        }
        
        .status-bar .online {
            color: #22c55e;
        }
        
        .status-bar .offline {
            color: #dc2626;
        }
        
        .status-bar .last-update {
            color: #888;
            font-size: 12px;
            margin-top: 4px;
        }
        
        /* Date navigation */
        .date-nav {
            background-color: #2d2d2d;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            text-align: center;
        }
        
        .date-nav button {
            background-color: #3b82f6;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            margin: 0 5px;
        }
        
        .date-nav button:active {
            background-color: #2563eb;
        }
        
        .date-nav .current-date {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            margin: 10px 0;
        }
        
        /* Section title */
        .section-title {
            font-size: 16px;
            color: #3b82f6;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #3d3d3d;
        }
        
        /* Summary cards */
        .summary {
            background-color: #2d2d2d;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
        }
        
        .summary-item {
            display: inline-block;
            text-align: center;
            padding: 10px 20px;
            margin-right: 10px;
            margin-bottom: 10px;
            background-color: #3d3d3d;
            border-radius: 6px;
        }
        
        .summary-item .count {
            font-size: 24px;
            font-weight: bold;
        }
        
        .summary-item .label {
            font-size: 12px;
            color: #a0a0a0;
        }
        
        .summary-item.pending .count { color: #8b5cf6; }
        .summary-item.accepted .count { color: #3b82f6; }
        .summary-item.paused .count { color: #f59e0b; }
        .summary-item.completed .count { color: #22c55e; }
        
        /* Task card */
        .task-card {
            background-color: #2d2d2d;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 4px solid #8b5cf6;
        }
        
        .task-card.accepted {
            border-left-color: #3b82f6;
        }
        
        .task-card.paused {
            border-left-color: #f59e0b;
        }
        
        .task-card.completed {
            border-left-color: #22c55e;
            opacity: 0.7;
        }
        
        .task-title {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
        }
        
        .task-meta {
            font-size: 13px;
            color: #a0a0a0;
            margin-bottom: 4px;
        }
        
        .task-operator {
            font-size: 13px;
            color: #22c55e;
            margin-bottom: 4px;
        }
        
        .task-operator.unassigned {
            color: #f59e0b;
        }
        
        .task-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
            margin-right: 8px;
        }
        
        .task-status.pending {
            background-color: #8b5cf6;
            color: #fff;
        }
        
        .task-status.accepted {
            background-color: #3b82f6;
            color: #fff;
        }
        
        .task-status.paused {
            background-color: #f59e0b;
            color: #fff;
        }
        
        .task-status.completed {
            background-color: #22c55e;
            color: #fff;
        }
        
        /* Buttons */
        .btn-container {
            margin-top: 12px;
        }
        
        .btn {
            display: inline-block;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 6px;
            margin-bottom: 6px;
            text-align: center;
        }
        
        .btn-primary {
            background-color: #3b82f6;
            color: #fff;
        }
        
        .btn-success {
            background-color: #22c55e;
            color: #fff;
        }
        
        .btn-warning {
            background-color: #f59e0b;
            color: #fff;
        }
        
        .btn-danger {
            background-color: #dc2626;
            color: #fff;
        }
        
        .btn-secondary {
            background-color: #6b7280;
            color: #fff;
        }
        
        .btn:active {
            opacity: 0.8;
        }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }
        
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        /* Login form */
        .login-container {
            max-width: 350px;
            margin: 60px auto;
            padding: 30px;
            background-color: #2d2d2d;
            border-radius: 10px;
        }
        
        .login-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #3b82f6;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #e0e0e0;
            font-size: 14px;
        }
        
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 1px solid #4d4d4d;
            border-radius: 6px;
            background-color: #1a1a1a;
            color: #fff;
        }
        
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #3b82f6;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .error-msg {
            background-color: #dc2626;
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }
        
        .success-msg {
            background-color: #22c55e;
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }
        
        /* Timeline */
        .task-timeline {
            background-color: #252525;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            font-size: 11px;
        }
        
        .task-timeline .timeline-title {
            color: #888;
            font-weight: bold;
            margin-bottom: 6px;
        }
        
        .task-timeline .timeline-item {
            color: #a0a0a0;
            margin: 3px 0;
        }
        
        /* Priority colors */
        .priority-low { color: #10B981; }
        .priority-medium { color: #FCD34D; }
        .priority-high { color: #F97316; }
        .priority-urgent { color: #EF4444; }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 20px;
            color: #888;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            z-index: 1000;
        }
        
        .modal-content {
            background-color: #2d2d2d;
            margin: 50px auto;
            padding: 25px;
            border-radius: 10px;
            max-width: 400px;
            max-height: 80%;
            overflow-y: auto;
        }
        
        .modal-content h3 {
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .modal-actions {
            margin-top: 20px;
            text-align: center;
        }
        
        /* Refresh button */
        .refresh-btn {
            background-color: #3d3d3d;
            color: #fff;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        
        /* Quick action bar */
        .quick-actions {
            background-color: #2d2d2d;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            text-align: center;
        }
        
        .quick-actions button {
            margin: 5px;
        }
    </style>
</head>
<body>
    <!-- Login Section -->
    <div id="loginSection">
        <div class="login-container">
            <h2>🏭 Molino Briganti</h2>
            <p style="text-align: center; color: #888; margin-bottom: 20px;">Accesso Amministratore</p>
            <div id="errorMsg" class="error-msg"></div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">👤 Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">🔒 Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login">Accedi</button>
            </form>
            <p style="text-align: center; margin-top: 15px; font-size: 12px; color: #666;">Versione Lite v1.0.19</p>
        </div>
    </div>
    
    <!-- Dashboard Section -->
    <div id="dashboardSection" style="display: none;">
        <div class="header">
            <h1>👨‍💼 Admin Lite</h1>
            <div class="user-info">
                <span id="userDisplay"></span>
                <a href="admin-dashboard.html" class="link-full">Versione Completa</a>
                <button class="logout-btn" onclick="handleLogout()">Esci</button>
            </div>
            <div class="clear"></div>
        </div>
        
        <div class="container">
            <div class="status-bar">
                <span id="connectionStatus" class="online">● Online</span>
                <div class="last-update">Ultimo aggiornamento: <span id="lastUpdate">--:--</span></div>
                <button class="refresh-btn" onclick="loadData()" style="margin-top: 8px;">🔄 Aggiorna</button>
            </div>
            
            <!-- Date navigation -->
            <div class="date-nav">
                <button onclick="changeDate(-1)">◀ Ieri</button>
                <button onclick="goToToday()">Oggi</button>
                <button onclick="changeDate(1)">Domani ▶</button>
                <div class="current-date" id="currentDateDisplay"></div>
            </div>
            
            <!-- Quick actions -->
            <div class="quick-actions">
                <button class="btn btn-success" onclick="openNewTaskModal()">➕ Nuovo Task</button>
            </div>
            
            <!-- Summary -->
            <div class="summary" id="summaryContainer">
                <div class="summary-item pending">
                    <div class="count" id="countPending">0</div>
                    <div class="label">In Sospeso</div>
                </div>
                <div class="summary-item accepted">
                    <div class="count" id="countAccepted">0</div>
                    <div class="label">Accettati</div>
                </div>
                <div class="summary-item paused">
                    <div class="count" id="countPaused">0</div>
                    <div class="label">In Pausa</div>
                </div>
                <div class="summary-item completed">
                    <div class="count" id="countCompleted">0</div>
                    <div class="label">Completati</div>
                </div>
            </div>
            
            <h3 class="section-title">📋 Task del Giorno</h3>
            
            <div id="tasksList">
                <div class="loading">Caricamento...</div>
            </div>
        </div>
    </div>
    
    <!-- Modal: New Task -->
    <div id="newTaskModal" class="modal">
        <div class="modal-content">
            <h3>➕ Nuovo Task</h3>
            <div id="taskSuccessMsg" class="success-msg"></div>
            <div id="taskErrorMsg" class="error-msg"></div>
            <form id="newTaskForm" onsubmit="handleCreateTask(event)">
                <div class="form-group">
                    <label>Titolo *</label>
                    <input type="text" id="taskTitle" required placeholder="es. Preparare ordine">
                </div>
                <div class="form-group">
                    <label>Descrizione</label>
                    <textarea id="taskDescription" rows="3" placeholder="Dettagli del task..."></textarea>
                </div>
                <div class="form-group">
                    <label>Data/Ora</label>
                    <input type="datetime-local" id="taskScheduledAt">
                </div>
                <div class="form-group">
                    <label>Assegna a</label>
                    <select id="taskOperator">
                        <option value="">-- Nessuno --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Priorita</label>
                    <select id="taskPriority">
                        <option value="LOW">🟢 Bassa</option>
                        <option value="MEDIUM" selected>🟡 Media</option>
                        <option value="HIGH">🟠 Alta</option>
                        <option value="URGENT">🔴 Urgente</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tempo stimato (minuti)</label>
                    <input type="number" id="taskMinutes" placeholder="30">
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-success">✅ Crea Task</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Annulla</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Modal: Assign Task -->
    <div id="assignModal" class="modal">
        <div class="modal-content">
            <h3>👤 Assegna Task</h3>
            <form id="assignForm" onsubmit="handleAssignTask(event)">
                <input type="hidden" id="assignTaskId">
                <div class="form-group">
                    <label>Assegna a</label>
                    <select id="assignOperator" required>
                        <option value="">-- Seleziona --</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary">👤 Assegna</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Annulla</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        // Configurazione - ES5 compatibile
        var API_URL = window.location.protocol + '//' + window.location.hostname + ':' + (window.location.port || 5000) + '/api';
        var token = null;
        var currentUser = null;
        var tasks = [];
        var operators = [];
        var selectedDate = new Date();
        var refreshInterval = null;
        
        // Inizializzazione
        function init() {
            token = localStorage.getItem('token');
            var userStr = localStorage.getItem('currentUser');
            if (userStr) {
                try {
                    currentUser = JSON.parse(userStr);
                } catch(e) {
                    currentUser = null;
                }
            }
            
            if (token && currentUser) {
                if (currentUser.role !== 'master') {
                    alert('Accesso riservato agli amministratori');
                    handleLogout();
                    return;
                }
                showDashboard();
                loadData();
                startAutoRefresh();
            } else {
                showLogin();
            }
        }
        
        function showLogin() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('dashboardSection').style.display = 'none';
        }
        
        function showDashboard() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'block';
            document.getElementById('userDisplay').textContent = currentUser ? currentUser.username : '';
            updateDateDisplay();
        }
        
        // Login
        function handleLogin(event) {
            event.preventDefault();
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            var errorMsg = document.getElementById('errorMsg');
            
            errorMsg.style.display = 'none';
            
            var xhr = new XMLHttpRequest();
            xhr.open('POST', API_URL + '/auth/login', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        var response = JSON.parse(xhr.responseText);
                        if (response.user.role !== 'master') {
                            errorMsg.textContent = 'Accesso riservato agli amministratori';
                            errorMsg.style.display = 'block';
                            return;
                        }
                        token = response.token;
                        currentUser = response.user;
                        localStorage.setItem('token', token);
                        localStorage.setItem('currentUser', JSON.stringify(currentUser));
                        showDashboard();
                        loadData();
                        startAutoRefresh();
                    } else {
                        errorMsg.textContent = 'Username o password errati';
                        errorMsg.style.display = 'block';
                    }
                }
            };
            
            xhr.send(JSON.stringify({ username: username, password: password }));
        }
        
        // Logout
        function handleLogout() {
            localStorage.removeItem('token');
            localStorage.removeItem('currentUser');
            token = null;
            currentUser = null;
            stopAutoRefresh();
            showLogin();
        }
        
        // Date navigation
        function updateDateDisplay() {
            var days = ['Domenica', 'Lunedi', 'Martedi', 'Mercoledi', 'Giovedi', 'Venerdi', 'Sabato'];
            var dayName = days[selectedDate.getDay()];
            var dateStr = padZero(selectedDate.getDate()) + '/' + 
                         padZero(selectedDate.getMonth() + 1) + '/' + 
                         selectedDate.getFullYear();
            document.getElementById('currentDateDisplay').textContent = dayName + ' ' + dateStr;
        }
        
        function changeDate(delta) {
            selectedDate.setDate(selectedDate.getDate() + delta);
            updateDateDisplay();
            renderTasks();
        }
        
        function goToToday() {
            selectedDate = new Date();
            updateDateDisplay();
            renderTasks();
        }
        
        // Load data
        function loadData() {
            loadTasks();
            loadOperators();
        }
        
        function loadTasks() {
            if (!token) return;
            
            var xhr = new XMLHttpRequest();
            xhr.open('GET', API_URL + '/tasks', true);
            xhr.setRequestHeader('Authorization', 'Bearer ' + token);
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        tasks = JSON.parse(xhr.responseText);
                        renderTasks();
                        updateLastRefresh();
                        setConnectionStatus(true);
                    } else if (xhr.status === 401) {
                        handleLogout();
                    } else {
                        setConnectionStatus(false);
                    }
                }
            };
            
            xhr.onerror = function() {
                setConnectionStatus(false);
            };
            
            xhr.send();
        }
        
        function loadOperators() {
            if (!token) return;
            
            var xhr = new XMLHttpRequest();
            xhr.open('GET', API_URL + '/users', true);
            xhr.setRequestHeader('Authorization', 'Bearer ' + token);
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        var users = JSON.parse(xhr.responseText);
                        operators = [];
                        for (var i = 0; i < users.length; i++) {
                            operators.push(users[i]);
                        }
                        populateOperatorSelects();
                    }
                }
            };
            
            xhr.send();
        }
        
        function populateOperatorSelects() {
            var selects = [
                document.getElementById('taskOperator'),
                document.getElementById('assignOperator')
            ];
            
            for (var s = 0; s < selects.length; s++) {
                var select = selects[s];
                if (!select) continue;
                
                // Mantieni prima opzione
                var firstOption = select.options[0];
                select.innerHTML = '';
                select.appendChild(firstOption);
                
                for (var i = 0; i < operators.length; i++) {
                    var op = operators[i];
                    var option = document.createElement('option');
                    option.value = op.id;
                    option.textContent = (op.role === 'master' ? '👨‍💼 ' : '👤 ') + op.username;
                    select.appendChild(option);
                }
            }
        }
        
        // Render tasks
        function renderTasks() {
            var container = document.getElementById('tasksList');
            
            var dateStr = selectedDate.getFullYear() + '-' + 
                         padZero(selectedDate.getMonth() + 1) + '-' + 
                         padZero(selectedDate.getDate());
            
            var dayTasks = [];
            for (var i = 0; i < tasks.length; i++) {
                var task = tasks[i];
                if (task.scheduledAt) {
                    var taskDate = task.scheduledAt.split('T')[0];
                    if (taskDate === dateStr) {
                        dayTasks.push(task);
                    }
                }
            }
            
            // Update counts
            var pending = 0, accepted = 0, paused = 0, completed = 0;
            for (var j = 0; j < dayTasks.length; j++) {
                var t = dayTasks[j];
                if (t.completed) {
                    completed++;
                } else if (t.paused) {
                    paused++;
                } else if (t.acceptedAt) {
                    accepted++;
                } else {
                    pending++;
                }
            }
            
            document.getElementById('countPending').textContent = pending;
            document.getElementById('countAccepted').textContent = accepted;
            document.getElementById('countPaused').textContent = paused;
            document.getElementById('countCompleted').textContent = completed;
            
            if (dayTasks.length === 0) {
                container.innerHTML = '<div class="empty-state">' +
                    '<div class="icon">📅</div>' +
                    '<p>Nessun task per questo giorno</p>' +
                    '</div>';
                return;
            }
            
            var html = '';
            for (var k = 0; k < dayTasks.length; k++) {
                html += renderTaskCard(dayTasks[k]);
            }
            container.innerHTML = html;
        }
        
        function renderTaskCard(task) {
            var statusClass = 'pending';
            var statusText = '📋 In Sospeso';
            var cardClass = '';
            
            if (task.completed) {
                statusClass = 'completed';
                statusText = '✅ Completato';
                cardClass = 'completed';
            } else if (task.paused) {
                statusClass = 'paused';
                statusText = '⏸️ In Pausa';
                cardClass = 'paused';
            } else if (task.acceptedAt) {
                statusClass = 'accepted';
                statusText = '👍 Accettato';
                cardClass = 'accepted';
            }
            
            var priorityClass = 'priority-medium';
            var priorityText = '🟡 Media';
            if (task.priority === 'LOW') {
                priorityClass = 'priority-low';
                priorityText = '🟢 Bassa';
            } else if (task.priority === 'HIGH') {
                priorityClass = 'priority-high';
                priorityText = '🟠 Alta';
            } else if (task.priority === 'URGENT') {
                priorityClass = 'priority-urgent';
                priorityText = '🔴 Urgente';
            }
            
            var operatorHtml = '';
            if (task.assignedOperator) {
                operatorHtml = '<div class="task-operator">👤 ' + escapeHtml(task.assignedOperator.username) + '</div>';
            } else {
                operatorHtml = '<div class="task-operator unassigned">👤 Non assegnato</div>';
            }
            
            var buttons = '<div class="btn-container">';
            
            if (!task.assignedOperator) {
                buttons += '<button class="btn btn-primary" onclick="openAssignModal(' + task.id + ')">👤 Assegna</button>';
            }
            
            if (!task.completed) {
                if (!task.acceptedAt) {
                    buttons += '<button class="btn btn-success" onclick="acceptTask(' + task.id + ')">👍 Accetta</button>';
                }
                buttons += '<button class="btn btn-danger" onclick="deleteTask(' + task.id + ')">🗑️ Elimina</button>';
            }
            
            buttons += '</div>';
            
            // Timeline
            var timeline = '<div class="task-timeline">';
            timeline += '<div class="timeline-title">📜 Storico:</div>';
            if (task.createdAt) {
                timeline += '<div class="timeline-item">📝 Creato: ' + formatDateTime(task.createdAt) + '</div>';
            }
            if (task.assignedAt) {
                timeline += '<div class="timeline-item">👤 Assegnato: ' + formatDateTime(task.assignedAt) + '</div>';
            }
            if (task.acceptedAt) {
                timeline += '<div class="timeline-item">👍 Accettato: ' + formatDateTime(task.acceptedAt) + '</div>';
            }
            if (task.pausedAt && task.paused) {
                timeline += '<div class="timeline-item">⏸️ In Pausa: ' + formatDateTime(task.pausedAt) + '</div>';
            }
            if (task.completedAt) {
                timeline += '<div class="timeline-item">✅ Completato: ' + formatDateTime(task.completedAt) + '</div>';
            }
            timeline += '</div>';
            
            var html = '<div class="task-card ' + cardClass + '">';
            html += '<div class="task-title">' + escapeHtml(task.title) + '</div>';
            html += '<span class="task-status ' + statusClass + '">' + statusText + '</span>';
            html += operatorHtml;
            
            if (task.description) {
                html += '<div class="task-meta">📝 ' + escapeHtml(task.description) + '</div>';
            }
            if (task.estimatedMinutes) {
                html += '<div class="task-meta">⏱️ ' + task.estimatedMinutes + ' min</div>';
            }
            html += '<div class="task-meta ' + priorityClass + '">' + priorityText + '</div>';
            
            html += timeline;
            html += buttons;
            html += '</div>';
            
            return html;
        }
        
        // Modals
        function openNewTaskModal() {
            // Set default date/time to selected date at 9:00
            var dt = new Date(selectedDate);
            dt.setHours(9, 0, 0, 0);
            var dtStr = dt.getFullYear() + '-' + padZero(dt.getMonth() + 1) + '-' + padZero(dt.getDate()) + 'T09:00';
            document.getElementById('taskScheduledAt').value = dtStr;
            
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskDescription').value = '';
            document.getElementById('taskOperator').value = '';
            document.getElementById('taskPriority').value = 'MEDIUM';
            document.getElementById('taskMinutes').value = '';
            document.getElementById('taskSuccessMsg').style.display = 'none';
            document.getElementById('taskErrorMsg').style.display = 'none';
            
            document.getElementById('newTaskModal').style.display = 'block';
        }
        
        function openAssignModal(taskId) {
            document.getElementById('assignTaskId').value = taskId;
            document.getElementById('assignOperator').value = '';
            document.getElementById('assignModal').style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('newTaskModal').style.display = 'none';
            document.getElementById('assignModal').style.display = 'none';
        }
        
        // Create task
        function handleCreateTask(event) {
            event.preventDefault();
            
            var title = document.getElementById('taskTitle').value.toUpperCase();
            var description = document.getElementById('taskDescription').value;
            var scheduledAt = document.getElementById('taskScheduledAt').value;
            var operatorId = document.getElementById('taskOperator').value;
            var priority = document.getElementById('taskPriority').value;
            var minutes = document.getElementById('taskMinutes').value;
            
            var data = {
                title: title,
                description: description || null,
                scheduledAt: scheduledAt ? new Date(scheduledAt).toISOString() : null,
                assignedOperatorId: operatorId ? parseInt(operatorId) : null,
                priority: priority,
                estimatedMinutes: minutes ? parseInt(minutes) : null
            };
            
            var xhr = new XMLHttpRequest();
            xhr.open('POST', API_URL + '/tasks', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.setRequestHeader('Authorization', 'Bearer ' + token);
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200 || xhr.status === 201) {
                        document.getElementById('taskSuccessMsg').textContent = 'Task creato!';
                        document.getElementById('taskSuccessMsg').style.display = 'block';
                        setTimeout(function() {
                            closeModal();
                            loadTasks();
                        }, 1000);
                    } else {
                        document.getElementById('taskErrorMsg').textContent = 'Errore nella creazione';
                        document.getElementById('taskErrorMsg').style.display = 'block';
                    }
                }
            };
            
            xhr.send(JSON.stringify(data));
        }
        
        // Assign task
        function handleAssignTask(event) {
            event.preventDefault();
            
            var taskId = document.getElementById('assignTaskId').value;
            var operatorId = document.getElementById('assignOperator').value;
            
            var xhr = new XMLHttpRequest();
            xhr.open('PUT', API_URL + '/tasks/' + taskId, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.setRequestHeader('Authorization', 'Bearer ' + token);
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        closeModal();
                        loadTasks();
                    } else {
                        alert('Errore nell\'assegnazione');
                    }
                }
            };
            
            xhr.send(JSON.stringify({ assignedOperatorId: parseInt(operatorId) }));
        }
        
        // Task actions
        function acceptTask(taskId) {
            var xhr = new XMLHttpRequest();
            xhr.open('POST', API_URL + '/tasks/' + taskId + '/accept', true);
            xhr.setRequestHeader('Authorization', 'Bearer ' + token);
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        loadTasks();
                    } else {
                        alert('Errore');
                    }
                }
            };
            
            xhr.send();
        }
        
        function deleteTask(taskId) {
            if (!confirm('Sei sicuro di voler eliminare questo task?')) return;
            
            var xhr = new XMLHttpRequest();
            xhr.open('DELETE', API_URL + '/tasks/' + taskId, true);
            xhr.setRequestHeader('Authorization', 'Bearer ' + token);
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        loadTasks();
                    } else {
                        alert('Errore');
                    }
                }
            };
            
            xhr.send();
        }
        
        // Utility functions
        function padZero(num) {
            return num < 10 ? '0' + num : '' + num;
        }
        
        function formatDateTime(dateStr) {
            if (!dateStr) return '--';
            var d = new Date(dateStr);
            return padZero(d.getDate()) + '/' + 
                   padZero(d.getMonth() + 1) + '/' + 
                   d.getFullYear() + ' ' + 
                   padZero(d.getHours()) + ':' + 
                   padZero(d.getMinutes());
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }
        
        function updateLastRefresh() {
            var now = new Date();
            document.getElementById('lastUpdate').textContent = 
                padZero(now.getHours()) + ':' + padZero(now.getMinutes()) + ':' + padZero(now.getSeconds());
        }
        
        function setConnectionStatus(online) {
            var elem = document.getElementById('connectionStatus');
            if (online) {
                elem.className = 'online';
                elem.textContent = '● Online';
            } else {
                elem.className = 'offline';
                elem.textContent = '● Offline';
            }
        }
        
        // Auto refresh ogni 5 secondi
        function startAutoRefresh() {
            stopAutoRefresh();
            refreshInterval = setInterval(loadTasks, 5000);
        }
        
        function stopAutoRefresh() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
                refreshInterval = null;
            }
        }
        
        // Close modal on outside click
        window.onclick = function(event) {
            if (event.target.className === 'modal') {
                closeModal();
            }
        };
        
        // Start app
        init();
    </script>
</body>
</html>
