<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Admin / Operatori - Molino Briganti</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/common-styles.css">
    <link rel="stylesheet" href="css/operators-custom.css">
    <script src="js/settings-utils.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div class="header-logo">
                    <img src="images/logo INSEGNA.png" alt="Molino Briganti Logo">
                </div>
                <h1>👥 Gestione Admin / Operatori</h1>
            </div>
            <div class="header-actions">
                <div class="user-info" id="userInfo"></div>
                <button class="btn btn-operators" data-icon="🏠" onclick="window.location.href='admin-dashboard.html'"><span>Home</span></button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
        <!-- Alert -->
        <div id="alert" class="alert"></div>

        <!-- Create Operator/Admin Section -->
        <div class="card">
            <h2>➕ Crea Nuovo Operatore / Admin</h2>
            <form id="createOperatorForm" onsubmit="handleCreateOperator(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label for="userType">Tipo *</label>
                        <select id="userType" required>
                            <option value="operator">👥 Operatore</option>
                            <option value="admin">👨‍💼 Admin</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="operatorUsername">Username *</label>
                        <input type="text" id="operatorUsername" placeholder="es. mario_rossi" autocomplete="username" required>
                    </div>
                    <div class="form-group">
                        <label for="operatorPassword">Password *</label>
                        <input type="password" id="operatorPassword" placeholder="Password sicura" autocomplete="new-password" required>
                    </div>
                    <div class="form-group">
                        <label>Immagine Profilo</label>
                        <div class="avatar-picker-row">
                            <div class="avatar-preview" id="createAvatarPreview" onclick="document.getElementById('createAvatarFile').click()" title="Clicca per scegliere un'immagine">
                                <span id="createAvatarPlaceholder">👤</span>
                            </div>
                            <div>
                                <button type="button" class="avatar-file-btn" onclick="document.getElementById('createAvatarFile').click()">📁 Scegli immagine</button>
                                <input type="file" id="createAvatarFile" class="avatar-file-input" accept="image/*" onchange="handleAvatarUpload(this, 'createAvatarPreview', 'createAvatarPlaceholder', 'operatorImageUrl')">
                                <input type="hidden" id="operatorImageUrl">
                                <div style="font-size:11px;color:#6b7280;margin-top:4px;">JPG, PNG, WebP — max 5MB</div>
                                <div id="createAvatarStatus" style="font-size:12px;color:#93c5fd;margin-top:2px;"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-success" data-icon="➕"><span>Crea<br>Utente</span></button>
            </form>
        </div>

        <!-- Operators/Admins List -->
        <div class="card">
            <h2>📋 Elenco Operatori e Admin</h2>
            <div id="operatorsContainer" class="operators-grid">
                <div class="empty-state">
                    <div class="spinner"></div>
                    <p class="operators-loading">Caricamento utenti...</p>
                </div>
            </div>
        </div>
        </div>

        <!-- Edit Operator Modal -->
    <div id="editModal" class="modal-overlay">
        <div class="modal-content">
            <h2>✏️ Modifica Utente</h2>
            <form id="editOperatorForm" onsubmit="handleEditOperator(event)" class="modal-form">
                <div class="form-group">
                    <label for="editOperatorUsername">Username</label>
                    <input type="text" id="editOperatorUsername" placeholder="Username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label>Tipo</label>
                    <div class="role-display">
                        <span id="editOperatorRole" class="role-display-text"></span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="editOperatorName">Nome Visualizzato</label>
                    <input type="text" id="editOperatorName" placeholder="es. Mario Rossi">
                </div>
                <div class="form-group">
                    <label for="editOperatorPassword">Nuova Password (lascia vuoto per mantenere l'attuale)</label>
                    <input type="password" id="editOperatorPassword" placeholder="Lascia vuoto per non modificare" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label>Immagine Profilo</label>
                    <div class="avatar-picker-row">
                        <div class="avatar-preview" id="editAvatarPreview" onclick="document.getElementById('editAvatarFile').click()" title="Clicca per cambiare immagine">
                            <span id="editAvatarPlaceholder">👤</span>
                        </div>
                        <div>
                            <button type="button" class="avatar-file-btn" onclick="document.getElementById('editAvatarFile').click()">📁 Scegli immagine</button>
                            <input type="file" id="editAvatarFile" class="avatar-file-input" accept="image/*" onchange="handleAvatarUpload(this, 'editAvatarPreview', 'editAvatarPlaceholder', 'editOperatorImageUrl')">
                            <input type="hidden" id="editOperatorImageUrl">
                            <div style="font-size:11px;color:#6b7280;margin-top:4px;">JPG, PNG, WebP — max 5MB</div>
                            <div id="editAvatarStatus" style="font-size:12px;color:#93c5fd;margin-top:2px;"></div>
                        </div>
                    </div>
                </div>
                <div class="modal-buttons">
                    <button type="submit" class="btn btn-primary modal-button-flex" data-icon="💾"><span>Salva<br>Modifiche</span></button>
                    <button type="button" class="btn btn-secondary modal-button-flex" data-icon="❌" onclick="closeEditModal()"><span>Annulla</span></button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = `http://${window.location.hostname}:${window.location.port || 5000}/api`;
        let token = localStorage.getItem('token');
        let currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
        let operatorsList = [];
        let editingOperatorId = null;

        // Check authorization
        window.addEventListener('load', async () => {
            if (!token || currentUser.role !== 'master') {
                window.location.href = '/index.html';
                return;
            }
            // Mostra avatar + nome utente loggato nell'header
            if (typeof renderUserInfoBadge === 'function') {
                renderUserInfoBadge('userInfo', currentUser);
            }
            // Nascondi il modale all'inizio
            document.getElementById('editModal').style.display = 'none';
            
            // Load branding
            if (window.SettingsUtils && window.SettingsUtils.loadAndApplyBranding) {
                await window.SettingsUtils.loadAndApplyBranding();
            }
            loadOperators();
        });

        async function loadOperators() {
            try {
                // Carica operatori e admin separatamente
                const operatorsResponse = await fetch(`${API_URL}/auth/operators`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const adminsResponse = await fetch(`${API_URL}/auth/admins`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!operatorsResponse.ok || !adminsResponse.ok) {
                    throw new Error('Errore nel caricamento degli utenti');
                }
                
                const operators = await operatorsResponse.json();
                const admins = await adminsResponse.json();
                
                // Combina e ordina
                operatorsList = [...admins, ...operators].sort((a, b) => a.username.localeCompare(b.username));
                renderOperators();
            } catch (error) {
                showAlert('Errore: ' + error.message, 'error');
            }
        }

        function renderOperators() {
            const container = document.getElementById('operatorsContainer');
            
            if (operatorsList.length === 0) {
                container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><p>Nessun utente creato</p></div>';
                return;
            }

            container.innerHTML = operatorsList.map(op => {
                const isSelf = currentUser && op.id === currentUser.id;
                const selfBadge = isSelf ? '<span class="badge-self" title="Sei tu" style="background:#3b82f6;color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;margin-left:6px;">Tu</span>' : '';
                const deleteBtn = isSelf
                    ? '<button class="btn btn-danger btn-small" data-icon="🚫" disabled title="Non puoi eliminare il tuo account" style="opacity:0.5;cursor:not-allowed;"><span>Cancella</span></button>'
                    : `<button class="btn btn-danger btn-small" data-icon="🗑️" onclick="handleDeleteOperator(${op.id}, '${op.username}')"><span>Cancella</span></button>`;
                return `
                <div class="operator-card"${isSelf ? ' style="border:2px solid #3b82f6;"' : ''}>
                    <div class="operator-card-header">
                        ${ op.image && op.image.startsWith('uploads/')
                            ? `<img class="operator-avatar" src="${API_URL.replace('/api','')}/${op.image}" alt="${op.name || op.username}" onerror="this.style.display='none'">`
                            : op.image && op.image.startsWith('http')
                            ? `<img class="operator-avatar" src="${op.image}" alt="${op.name || op.username}" onerror="this.style.display='none'">`
                            : `<div class="operator-avatar" style="background:#374151;display:flex;align-items:center;justify-content:center;font-size:24px;">${op.image || (op.role === 'master' ? '👨‍💼' : '👥')}</div>`
                        }
                        <h3>${op.name || op.username}${selfBadge}</h3>
                    </div>
                    <div class="operator-info">
                        <div>📝 Username: ${op.username}</div>
                        <div>📋 Tipo: ${op.role === 'master' ? 'Admin' : 'Operatore'}</div>
                        <div>📅 Creato: ${new Date(op.createdAt).toLocaleString('it-IT', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })}</div>
                    </div>
                    <div class="operator-actions">
                        <button class="btn btn-warning btn-small" data-icon="✏️" onclick="openEditModal(${op.id}, '${op.username}', '${op.name || ''}', '${op.image || ''}', '${op.role}')"><span>Modifica</span></button>
                        ${deleteBtn}
                    </div>
                </div>`;
            }).join('');
        }

        async function handleCreateOperator(event) {
            event.preventDefault();
            
            const userType = document.getElementById('userType').value;
            const username = document.getElementById('operatorUsername').value;
            const password = document.getElementById('operatorPassword').value;
            const image = document.getElementById('operatorImageUrl').value;

            try {
                const endpoint = userType === 'admin' ? '/auth/create-admin' : '/auth/create-operator';
                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ username, password, image: image || null })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.message || 'Errore nella creazione');

                showAlert(`${userType === 'admin' ? 'Admin' : 'Operatore'} creato con successo!`, 'success');
                document.getElementById('createOperatorForm').reset();
                document.getElementById('operatorImageUrl').value = '';
                resetAvatarPreview('createAvatarPreview', 'createAvatarPlaceholder', 'createAvatarStatus');
                await loadOperators();
            } catch (error) {
                showAlert('Errore: ' + error.message, 'error');
            }
        }

        function openEditModal(operatorId, username, name, image, role) {
            editingOperatorId = operatorId;
            document.getElementById('editOperatorUsername').value = username;
            document.getElementById('editOperatorName').value = name || '';
            document.getElementById('editOperatorImageUrl').value = image || '';
            document.getElementById('editOperatorRole').textContent = role === 'master' ? 'Admin' : 'Operatore';
            // Mostra preview immagine attuale
            const preview = document.getElementById('editAvatarPreview');
            const placeholder = document.getElementById('editAvatarPlaceholder');
            if (image && (image.startsWith('uploads/') || image.startsWith('http'))) {
                const fullUrl = image.startsWith('http') ? image : `${API_URL.replace('/api', '')}/${image}`;
                preview.innerHTML = `<img src="${fullUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.parentElement.innerHTML='<span>👤</span>'">`;
            } else if (image) {
                preview.innerHTML = `<span style="font-size:28px;">${image}</span>`;
            } else {
                preview.innerHTML = '<span id="editAvatarPlaceholder">👤</span>';
            }
            document.getElementById('editAvatarFile').value = '';
            document.getElementById('editAvatarStatus').textContent = '';
            const modal = document.getElementById('editModal');
            modal.style.cssText = 'display: flex !important; position: fixed !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; z-index: 10000 !important;';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            editingOperatorId = null;
        }

        async function handleEditOperator(event) {
            event.preventDefault();
            
            const username = document.getElementById('editOperatorUsername').value.trim();
            const password = document.getElementById('editOperatorPassword').value;
            const name = document.getElementById('editOperatorName').value;
            const image = document.getElementById('editOperatorImageUrl').value;

            if (!username) {
                showAlert('Username non può essere vuoto', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/operators/${editingOperatorId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ 
                        username: username,
                        password: password || undefined,
                        name: name || null,
                        image: image || null 
                    })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.message || 'Errore nella modifica');

                // Se ho modificato me stesso, aggiorna currentUser in localStorage e badge header
                if (data.operator && currentUser && data.operator.id === currentUser.id) {
                    currentUser = { ...currentUser, ...data.operator };
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    if (typeof renderUserInfoBadge === 'function') {
                        renderUserInfoBadge('userInfo', currentUser);
                    }
                }

                showAlert('Operatore modificato con successo!', 'success');
                closeEditModal();
                await loadOperators();
            } catch (error) {
                showAlert('Errore: ' + error.message, 'error');
            }
        }

        async function handleDeleteOperator(operatorId, operatorName) {
            if (!await customConfirm(`Eliminare l'operatore "${operatorName}"?`)) return;

            try {
                const response = await fetch(`${API_URL}/auth/operators/${operatorId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.message || 'Errore nell\'eliminazione');

                showAlert(`Operatore "${operatorName}" eliminato con successo!`, 'success');
                await loadOperators();
            } catch (error) {
                showAlert('Errore: ' + error.message, 'error');
            }
        }

        function handleLogout() {
            localStorage.removeItem('token');
            localStorage.removeItem('currentUser');
            window.location.href = '/index.html';
        }

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert show alert-${type}`;
            
            setTimeout(() => {
                alert.classList.remove('show');
            }, 5000);
        }

        async function handleAvatarUpload(input, previewId, placeholderId, urlInputId) {
            const file = input.files[0];
            if (!file) return;
            const statusId = previewId === 'createAvatarPreview' ? 'createAvatarStatus' : 'editAvatarStatus';
            const statusEl = document.getElementById(statusId);
            if (statusEl) statusEl.textContent = '⏳ Caricamento...';

            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch(`${API_URL}/upload/user-image`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                const data = await response.json();
                if (!response.ok || !data.success) throw new Error(data.message || 'Errore upload');

                document.getElementById(urlInputId).value = data.url;

                // Mostra preview
                const preview = document.getElementById(previewId);
                const baseUrl = API_URL.replace('/api', '');
                preview.innerHTML = `<img src="${baseUrl}/${data.url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;

                if (statusEl) statusEl.textContent = '✅ Immagine caricata';
            } catch (error) {
                if (statusEl) statusEl.textContent = `❌ ${error.message}`;
                showAlert('Errore upload immagine: ' + error.message, 'error');
            }
        }

        function resetAvatarPreview(previewId, placeholderId, statusId) {
            const preview = document.getElementById(previewId);
            if (preview) preview.innerHTML = `<span id="${placeholderId}">👤</span>`;
            const status = document.getElementById(statusId);
            if (status) status.textContent = '';
        }

        // Close modal when clicking outside
        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('editModal')) {
                closeEditModal();
            }
        });

        // Global ESC key handler
        function customConfirm(msg) {
            return new Promise(resolve => {
                const ov = document.createElement('div');
                ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:99999;display:flex;align-items:center;justify-content:center;';
                ov.innerHTML = `<div style="background:#2d2d2d;border-radius:12px;padding:28px 32px;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.5);border:1px solid #4d4d4d;"><p style="color:#e0e0e0;font-size:15px;margin:0 0 24px;line-height:1.6;">${msg.replace(/\n/g,'<br>')}</p><div style="display:flex;gap:10px;justify-content:flex-end;"><button id="_ccNo" style="background:#374151;color:#e0e0e0;border:none;border-radius:6px;padding:9px 22px;font-size:14px;cursor:pointer;">Annulla</button><button id="_ccYes" style="background:#dc2626;color:#fff;border:none;border-radius:6px;padding:9px 22px;font-size:14px;font-weight:600;cursor:pointer;">Conferma</button></div></div>`;
                document.body.appendChild(ov);
                const done = r => { ov.remove(); resolve(r); };
                ov.querySelector('#_ccYes').onclick = () => done(true);
                ov.querySelector('#_ccNo').onclick = () => done(false);
                ov.onclick = ev => { if (ev.target === ov) done(false); };
                const kh = ev => { if (ev.key === 'Enter') { ev.preventDefault(); done(true); } else if (ev.key === 'Escape') done(false); document.removeEventListener('keydown', kh); };
                document.addEventListener('keydown', kh);
                ov.querySelector('#_ccYes').focus();
            });
        }

        document.addEventListener('keydown', function(e) {
            const tag = document.activeElement?.tagName;
            const inInput = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
            if (e.key === 'Escape') {
                const modal = document.getElementById('editModal');
                if (modal && modal.style.display !== 'none') { closeEditModal(); }
            } else if (e.key === 'Enter' && !inInput) {
                const modal = document.getElementById('editModal');
                if (modal && modal.style.display !== 'none') {
                    const saveBtn = modal.querySelector('button.btn-primary');
                    if (saveBtn && !saveBtn.disabled) { e.preventDefault(); saveBtn.click(); }
                }
            }
        });
    </script>
    <script src="js/user-info-badge.js"></script>
    <script src="js/header-overflow-menu.js"></script>
    <script src="js/ui-confirm.js"></script>
</body>
</html>
