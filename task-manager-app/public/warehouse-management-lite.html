<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magazzino Lite - Carico/Scarico - Molino Briganti</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/common-styles.css">
    <link rel="stylesheet" href="css/warehouse-management-lite-custom.css">
    <script src="js/settings-utils.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/alerts-badge.js" defer></script>
</head>
<body>

    <div class="container">
        <div class="sticky-top-bar">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div class="header-logo">
                    <img src="images/logo INSEGNA.png" alt="Logo" class="logo-hidden">
                </div>
                <div class="header-title">
                    <h1>📦 Magazzino Lite <small>Carico / Scarico rapido</small></h1>
                    <div class="user-info" id="userBadge"></div>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-back btn-sm" onclick="window.location.href='warehouse-management.html'">🏭 Versione completa</button>
                <button class="btn btn-danger btn-sm" onclick="handleLogout()">🚪 Logout</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-row" id="statsRow">
            <div class="stat-card">
                <div class="val" id="sTotColli">0</div>
                <div class="lbl">Colli Tot</div>
            </div>
            <div class="stat-card" style="border-left-color:#16a34a;">
                <div class="val" id="sTotKg">0</div>
                <div class="lbl">Kg Tot</div>
            </div>
            <div class="stat-card" style="border-left-color:#dc2626;">
                <div class="val" id="sVuoti">0</div>
                <div class="lbl">Scaffali Vuoti</div>
            </div>
            <div class="stat-card" style="border-left-color:#0891b2;">
                <div class="val" id="sLastUpdate">-</div>
                <div class="lbl">Aggiornato</div>
            </div>
        </div>
        </div><!-- /.sticky-top-bar -->

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" data-tab="prodotti" onclick="switchTab('prodotti')">📦 Prodotti</div>
        <div class="tab" data-tab="scaffali" onclick="switchTab('scaffali')">🏗️ Scaffali</div>
    </div>

        <!-- Search -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Cerca articolo, codice o posizione..." oninput="onSearch()">
            <button class="clear-btn" id="clearSearch" onclick="clearSearchInput()">✕</button>
        </div>

        <!-- TAB: Prodotti -->
        <div class="tab-panel active" id="panelProdotti">
            <div class="category-bar" id="categoryBar"></div>
            <div class="product-list" id="productList">
                <div class="empty-state">⏳ Caricamento...</div>
            </div>
        </div>

        <!-- TAB: Scaffali -->
        <div class="tab-panel" id="panelScaffali">
            <div id="shelfContainer">
                <div class="empty-state">⏳ Caricamento...</div>
            </div>
        </div>

    </div>

    <!-- MODAL: Carico/Scarico -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModalOverlay(event)">
        <div class="modal">
            <h3 id="modalTitle">📥 Carico Merce</h3>

            <!-- Article Info -->
            <div class="modal-article-info" id="modalArticleInfo">
                <div class="art-name" id="modalArtName">-</div>
                <div class="art-code" id="modalArtCode">-</div>
                <div class="art-stock">
                    Giacenza: <strong id="modalArtStock">0</strong> colli
                    (<span id="modalArtKg">0</span> kg)
                </div>
            </div>

            <!-- Position info (when from shelf) -->
            <div class="modal-position-info" id="modalPosInfo" style="display:none;">
                Posizione scaffale: <strong id="modalPosCode">-</strong>
                &nbsp;·&nbsp; Nello scaffale: <strong id="modalPosQty">0</strong> colli
            </div>

            <!-- Type switch -->
            <div class="type-switch">
                <div class="type-btn active-carico" id="btnModCarico" onclick="setModalType('CARICO')">
                    📥 Carico
                </div>
                <div class="type-btn" id="btnModScarico" onclick="setModalType('SCARICO')">
                    📤 Scarico
                </div>
            </div>

            <!-- Quantity -->
            <div>
                <label style="font-size:12px;color:var(--muted);text-transform:uppercase;font-weight:600;display:block;margin-bottom:6px;" id="lblQty">Quantità da caricare (colli)</label>
                <div class="qty-control">
                    <button class="qty-btn" onclick="modQty(-10)">-10</button>
                    <button class="qty-btn" onclick="modQty(-1)">−</button>
                    <input type="number" class="qty-input" id="modalQty" value="1" min="0" oninput="updateKgPreview()">
                    <button class="qty-btn" onclick="modQty(1)">+</button>
                    <button class="qty-btn" onclick="modQty(10)">+10</button>
                </div>
                <div class="qty-kg-preview" id="kgPreview"></div>
            </div>

            <!-- Extra fields for carico -->
            <div id="modalExtraFields">
                <div class="field-row">
                    <div class="field">
                        <label>Lotto (opzionale)</label>
                        <input type="text" id="modalLotto" placeholder="Es. L2025-001">
                    </div>
                    <div class="field">
                        <label>Scadenza (opzionale)</label>
                        <input type="date" id="modalScadenza">
                    </div>
                </div>
            </div>
            <div class="field">
                <label>Note (opzionale)</label>
                <input type="text" id="modalNote" placeholder="Es. Resa da cliente...">
            </div>

            <!-- Position select (when from product tab) -->
            <div class="field" id="modalPosSelectField" style="display:none;">
                <label>Posizione scaffale (opzionale)</label>
                <select id="modalPosSelect">
                    <option value="">-- Nessuna posizione --</option>
                </select>
            </div>

            <div class="modal-actions">
                <button class="btn btn-gray" onclick="closeModal()">✕ Annulla</button>
                <button class="btn btn-success" id="modalConfirmBtn" onclick="submitModal()">
                    ✓ Conferma Carico
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
    // ===== STATE =====
    const API_URL = `http://${window.location.hostname}:${window.location.port || 5000}/api`;
    let token = localStorage.getItem('token') || '';
    let currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
    let allArticles = [];
    let allShelfPositions = [];
    let allShelfEntries = [];
    let recentMovements = [];  // local log of this session
    let currentTab = 'prodotti';
    let searchTerm = '';
    let selectedCategory = null; // null = Tutti

    // Modal state
    let modalType = 'CARICO';  // CARICO | SCARICO
    let modalArticle = null;
    let modalEntry = null;     // shelf entry (when from shelf view)
    let modalPosCode = null;

    // ===== INIT =====
    window.addEventListener('load', async () => {
        if (!token || !currentUser.id) {
            window.location.href = '/index.html';
            return;
        }
        const badge = document.getElementById('userBadge');
        if (badge && currentUser.username) badge.textContent = `👤 ${currentUser.username}`;
        if (window.SettingsUtils && window.SettingsUtils.loadAndApplyBranding) {
            await window.SettingsUtils.loadAndApplyBranding();
        }
        await loadAll();
        setupSocket();
        // Sticky-top-bar scroll behavior (collapse stats on scroll)
        const stb = document.querySelector('.sticky-top-bar');
        if (stb) {
            window.addEventListener('scroll', () => {
                if (window.scrollY > 30) stb.classList.add('scrolled');
                else stb.classList.remove('scrolled');
            }, { passive: true });
        }
    });

    function handleLogout() {
        localStorage.removeItem('token');
        localStorage.removeItem('currentUser');
        window.location.href = '/index.html';
    }

    // ===== SOCKET.IO =====
    function setupSocket() {
        if (typeof io === 'undefined') return;
        const socket = io(window.location.origin, { transports: ['websocket', 'polling'] });
        let reloadTimer = null;
        socket.on('inventory:updated', () => {
            clearTimeout(reloadTimer);
            reloadTimer = setTimeout(() => loadAll(), 500);
        });
    }

    // ===== DATA =====
    async function loadAll() {
        try {
            const [artResp, posResp, entResp] = await Promise.all([
                fetch(`${API_URL}/inventory/articles`, { headers: { 'Authorization': `Bearer ${token}` } }),
                fetch(`${API_URL}/inventory/shelf-positions`, { headers: { 'Authorization': `Bearer ${token}` } }),
                fetch(`${API_URL}/inventory/shelf-entries`, { headers: { 'Authorization': `Bearer ${token}` } })
            ]);
            if (artResp.ok) allArticles = await artResp.json();
            if (posResp.ok) allShelfPositions = await posResp.json();
            if (entResp.ok) allShelfEntries = await entResp.json();
        } catch (e) {
            console.error('Errore caricamento:', e);
        }
        updateStats();
        renderCurrentTab();
    }

    function getWeightPerUnit(article) {
        if (article && article.weightPerUnit && article.weightPerUnit > 0) return article.weightPerUnit;
        const code = article?.code || '';
        const match = code.match(/-(\d+)$/);
        return match ? (parseInt(match[1]) || 1) : 1;
    }

    function calcKg(qty, article) {
        return (parseInt(qty) || 0) * (getWeightPerUnit(article) || 1);
    }

    // ===== STATS =====
    function updateStats() {
        const valid = allArticles.filter(a => !a.code?.startsWith('EMPTY-'));
        // Calculate total from shelf entries for accuracy
        let totalColli = 0;
        let totalKg = 0;
        let vuoti = 0;

        valid.forEach(art => {
            const entries = allShelfEntries.filter(e => e.articleId === art.id);
            const artColli = entries.reduce((s, e) => s + (e.quantity || 0), 0);
            totalColli += artColli;
            totalKg += calcKg(artColli, art);
            if (artColli === 0) vuoti++;
        });

        document.getElementById('sTotColli').textContent = totalColli.toLocaleString('it-IT');
        document.getElementById('sTotKg').textContent = Math.round(totalKg).toLocaleString('it-IT');
        document.getElementById('sVuoti').textContent = vuoti;
        const lu = document.getElementById('sLastUpdate');
        if (lu) lu.textContent = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    }

    // ===== TABS =====
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        const panel = document.getElementById('panel' + tab.charAt(0).toUpperCase() + tab.slice(1));
        if (panel) panel.classList.add('active');
        renderCurrentTab();
    }

    function renderCurrentTab() {
        if (currentTab === 'prodotti') renderProductList();
        else if (currentTab === 'scaffali') renderShelfView();
    }

    // ===== SEARCH =====
    function onSearch() {
        searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
        document.getElementById('clearSearch').classList.toggle('show', searchTerm.length > 0);
        renderCurrentTab();
    }

    function clearSearchInput() {
        document.getElementById('searchInput').value = '';
        searchTerm = '';
        document.getElementById('clearSearch').classList.remove('show');
        renderCurrentTab();
    }

    // ===== CATEGORY HELPERS =====
    const CATEGORY_META = {
        'FARINE':         { icon: '🌾', color: '#f59e0b' },
        'MIX FARINE':     { icon: '🥣', color: '#d97706' },
        'SEMOLE':         { icon: '🌽', color: '#84cc16' },
        'CEREALI':        { icon: '🌿', color: '#10b981' },
        'CEREALI PERLATI':{ icon: '💎', color: '#06b6d4' },
        'MANGIMI':        { icon: '🐄', color: '#8b5cf6' },
        'ALTRO':          { icon: '📦', color: '#6b7280' },
    };

    function getArticleCategory(art) {
        if (art.category) return art.category.toUpperCase();
        const code = art.code || '';
        if (code.startsWith('F-')) return 'FARINE';
        if (code.startsWith('FM-')) return 'MIX FARINE';
        if (code.startsWith('GD-')) return 'SEMOLE';
        if (code.startsWith('Z-')) return 'CEREALI';
        if (code.startsWith('MG-')) return 'MANGIMI';
        if (code.startsWith('CP-')) return 'CEREALI PERLATI';
        return 'ALTRO';
    }

    function selectCategory(cat) {
        selectedCategory = cat === selectedCategory ? null : cat;
        renderProductList();
    }

    // ===== RENDER: PRODUCT LIST =====
    function renderProductList() {
        const container = document.getElementById('productList');
        const catBar = document.getElementById('categoryBar');
        const valid = allArticles
            .filter(a => !a.code?.startsWith('EMPTY-'))
            .sort((a, b) => (a.name || '').localeCompare(b.name || '', 'it'));

        // Build category counts
        const catCounts = {};
        valid.forEach(a => {
            const cat = getArticleCategory(a);
            catCounts[cat] = (catCounts[cat] || 0) + 1;
        });

        // Ordered category list: prima quelle note nell'ordine definito, poi eventuali categorie extra dal DB
        const catOrder = ['FARINE', 'MIX FARINE', 'SEMOLE', 'CEREALI', 'CEREALI PERLATI', 'MANGIMI', 'ALTRO'];
        const activeCats = [
            ...catOrder.filter(c => catCounts[c]),
            ...Object.keys(catCounts).filter(c => !catOrder.includes(c))
        ];

        // Render category bar
        catBar.innerHTML = `<button class="cat-btn ${selectedCategory === null ? 'active' : ''}" onclick="selectCategory(null)">
                <span class="cat-icon">📋</span> Tutti <span class="cat-count">${valid.length}</span>
            </button>` +
            activeCats.map(cat => {
                const meta = CATEGORY_META[cat] || { icon: '📦', color: '#6b7280' };
                const isActive = selectedCategory === cat;
                return `<button class="cat-btn ${isActive ? 'active' : ''}" onclick="selectCategory('${cat}')" style="${isActive ? '' : `border-color:${meta.color}40`}">
                    <span class="cat-icon">${meta.icon}</span> ${cat} <span class="cat-count">${catCounts[cat]}</span>
                </button>`;
            }).join('');

        // Filter by search
        let filtered = searchTerm
            ? valid.filter(a => {
                const text = `${a.name} ${a.code} ${a.category || ''}`.toLowerCase();
                const entries = allShelfEntries.filter(e => e.articleId === a.id);
                const posText = entries.map(e => e.positionCode).join(' ').toLowerCase();
                return text.includes(searchTerm) || posText.includes(searchTerm);
            })
            : valid;

        // Filter by selected category
        if (selectedCategory) {
            filtered = filtered.filter(a => getArticleCategory(a) === selectedCategory);
        }

        if (!filtered.length) {
            container.innerHTML = `<div class="empty-state">${searchTerm ? '🔍 Nessun risultato per "' + searchTerm + '"' : selectedCategory ? '📦 Nessun prodotto in ' + selectedCategory : '📦 Nessun prodotto trovato'}</div>`;
            return;
        }

        // Group by category
        const grouped = {};
        filtered.forEach(a => {
            const cat = getArticleCategory(a);
            if (!grouped[cat]) grouped[cat] = [];
            grouped[cat].push(a);
        });

        // Render grouped
        let html = '';
        const allCatsSorted = [
            ...catOrder.filter(c => grouped[c]),
            ...Object.keys(grouped).filter(c => !catOrder.includes(c))
        ];
        const renderCats = selectedCategory ? [selectedCategory] : allCatsSorted;

        renderCats.forEach(cat => {
            const arts = grouped[cat];
            if (!arts) return;
            const meta = CATEGORY_META[cat] || { icon: '📦', color: '#6b7280' };

            html += `<div class="category-group-header" style="border-left: 4px solid ${meta.color};">
                <span class="cat-h-icon">${meta.icon}</span> ${cat}
                <span class="cat-h-count">${arts.length} articol${arts.length === 1 ? 'o' : 'i'}</span>
            </div>`;

            html += arts.map(art => {
                const entries = allShelfEntries.filter(e => e.articleId === art.id);
                const totalQty = entries.reduce((s, e) => s + (e.quantity || 0), 0);
                const totalKg = calcKg(totalQty, art);
                const positions = entries.map(e => e.positionCode).join(', ') || '—';
                const minS = (art.inventory && art.inventory.minimumStock) || 0;
                const critS = (art.inventory && art.inventory.criticalStock) || 0;
                let qtyClass;
                if (totalQty === 0) qtyClass = 'zero';
                else if (critS > 0 && totalQty <= critS) qtyClass = 'zero';
                else if (minS > 0 && totalQty <= minS) qtyClass = 'low';
                else if (minS === 0 && totalQty < 5) qtyClass = 'low';
                else qtyClass = 'ok';
                const sogliaInfo = (minS > 0 || critS > 0)
                    ? `<div class="product-soglie" style="font-size:11px;color:#9ca3af;margin-top:2px;">⚠️ ${minS} · 🚨 ${critS}</div>`
                    : '';

                return `
                <div class="product-row">
                    <div class="product-info">
                        <div class="product-name">${art.name || '—'}</div>
                        <div class="product-code">${art.code || '—'} · 📍 ${positions}</div>
                        ${sogliaInfo}
                    </div>
                    <div class="product-stock">
                        <div class="qty ${qtyClass}">${totalQty}</div>
                        <div class="unit">${totalKg} kg</div>
                    </div>
                    <div class="product-actions">
                        <button class="btn-carico" title="Carico" onclick="openModal(${art.id}, 'CARICO')">+</button>
                        <button class="btn-scarico" title="Scarico" onclick="openModal(${art.id}, 'SCARICO')" ${totalQty === 0 ? 'disabled style="opacity:0.4;cursor:not-allowed;"' : ''}>−</button>
                    </div>
                </div>`;
            }).join('');
        });

        container.innerHTML = html;
    }

    // ===== RENDER: SHELF VIEW =====
    function renderShelfView() {
        const container = document.getElementById('shelfContainer');
        const sectors = {};

        // Natural sort helper: A1.2 before A10.1
        function naturalCmp(a, b) {
            return (a || '').localeCompare(b || '', undefined, { numeric: true, sensitivity: 'base' });
        }

        allShelfPositions.forEach(pos => {
            const sector = pos.code.charAt(0).toUpperCase();
            if (!sectors[sector]) sectors[sector] = [];
            sectors[sector].push({
                ...pos,
                entries: allShelfEntries.filter(e => e.positionCode === pos.code)
            });
        });

        // Sort positions within each sector
        Object.values(sectors).forEach(arr => arr.sort((a, b) => naturalCmp(a.code, b.code)));

        if (!Object.keys(sectors).length) {
            container.innerHTML = '<div class="empty-state">🏗️ Nessuna posizione scaffale configurata</div>';
            return;
        }

        container.innerHTML = Object.keys(sectors).sort(naturalCmp).map(sector => {
            const positions = sectors[sector];
            const occupied = positions.filter(p => p.entries.length > 0).length;

            // Filter by search
            let filteredPositions = positions;
            if (searchTerm) {
                filteredPositions = positions.filter(pos => {
                    const posText = `${pos.code} ${pos.description || ''}`.toLowerCase();
                    if (posText.includes(searchTerm)) return true;
                    return pos.entries.some(e => {
                        const art = allArticles.find(a => a.id === e.articleId);
                        return art && `${art.name} ${art.code}`.toLowerCase().includes(searchTerm);
                    });
                });
                if (!filteredPositions.length) return '';
            }

            return `
            <div class="shelf-sector">
                <div class="shelf-sector-head" onclick="toggleSectorLite('${sector}')" id="shHead-${sector}">
                    <span>🏗️</span>
                    <span class="name">Settore ${sector}</span>
                    <span class="count">${occupied}/${positions.length}</span>
                    <span class="chevron">▼</span>
                </div>
                <div class="shelf-grid" id="shGrid-${sector}" style="display:grid;">
                    ${filteredPositions.map(pos => renderShelfCell(pos)).join('')}
                </div>
            </div>`;
        }).join('');
    }

    function renderShelfCell(pos) {
        if (!pos.entries.length) {
            return `
            <div class="shelf-cell empty">
                <div class="shelf-pos-code">${pos.code}</div>
                <div style="color:#666;font-size:13px;text-align:center;padding:8px 0;">📭 Vuoto</div>
            </div>`;
        }

        return `
        <div class="shelf-cell occupied">
            <div class="shelf-pos-code">${pos.code}</div>
            ${pos.description ? `<div style="font-size:11px;color:#9ca3af;margin-bottom:4px;">${pos.description}</div>` : ''}
            ${pos.entries.map(entry => {
                const art = allArticles.find(a => a.id === entry.articleId);
                const name = art?.name || `#${entry.articleId}`;
                const code = art?.code || '';
                const qty = entry.quantity || 0;
                const qtyClass = qty === 0 ? 'zero' : '';

                return `
                <div class="shelf-entry-row">
                    <div class="shelf-entry-info">
                        <div class="shelf-entry-name" title="${name}">${name}</div>
                        <div class="shelf-entry-details">
                            <span>${code}</span>
                            ${entry.batch ? `<span>🏷️ ${entry.batch}</span>` : ''}
                            ${entry.expiry ? `<span>📅 ${entry.expiry}</span>` : ''}
                        </div>
                    </div>
                    <div class="shelf-entry-qty ${qtyClass}">${qty}</div>
                    <div class="shelf-entry-actions">
                        <button class="btn-plus" title="Carico" onclick="openModalFromShelf(${entry.id}, 'CARICO')">+</button>
                        <button class="btn-minus" title="Scarico" onclick="openModalFromShelf(${entry.id}, 'SCARICO')" ${qty === 0 ? 'disabled style="opacity:0.3;"' : ''}>−</button>
                    </div>
                </div>`;
            }).join('')}
        </div>`;
    }

    function toggleSectorLite(sector) {
        const grid = document.getElementById(`shGrid-${sector}`);
        const head = document.getElementById(`shHead-${sector}`);
        if (!grid) return;
        const isVisible = grid.style.display !== 'none';
        grid.style.display = isVisible ? 'none' : 'grid';
        head.classList.toggle('collapsed', isVisible);
    }

    // ===== RENDER: HISTORY =====
    function renderHistory() {
        const container = document.getElementById('historyList');
        if (!recentMovements.length) {
            container.innerHTML = '<div class="empty-state">📋 I movimenti di questa sessione appariranno qui.<br><small style="color:#666;">Esegui un carico o scarico per iniziare.</small></div>';
            return;
        }

        container.innerHTML = recentMovements.map(m => {
            const isIn = m.type === 'CARICO';
            return `
            <div class="history-item">
                <div class="history-icon">${isIn ? '📥' : '📤'}</div>
                <div class="history-info">
                    <div class="h-name">${m.articleName}</div>
                    <div class="h-detail">
                        ${m.position ? `📍 ${m.position} · ` : ''}${m.time}
                        ${m.note ? ` · ${m.note}` : ''}
                    </div>
                </div>
                <div class="history-qty ${isIn ? 'in' : 'out'}">${isIn ? '+' : '-'}${m.qty}</div>
            </div>`;
        }).join('');
    }

    // ===== MODAL =====
    function openModal(articleId, type) {
        modalArticle = allArticles.find(a => a.id === articleId);
        if (!modalArticle) return;
        modalEntry = null;
        modalPosCode = null;
        setModalType(type);

        // Article info
        document.getElementById('modalArtName').textContent = modalArticle.name || '—';
        document.getElementById('modalArtCode').textContent = modalArticle.code || '—';
        const entries = allShelfEntries.filter(e => e.articleId === articleId);
        const totalQty = entries.reduce((s, e) => s + (e.quantity || 0), 0);
        document.getElementById('modalArtStock').textContent = totalQty;
        document.getElementById('modalArtKg').textContent = calcKg(totalQty, modalArticle);

        // Hide position info, show position select
        document.getElementById('modalPosInfo').style.display = 'none';

        // Position select
        const posField = document.getElementById('modalPosSelectField');
        const posSel = document.getElementById('modalPosSelect');
        if (entries.length > 0) {
            posField.style.display = 'block';
            posSel.innerHTML = '<option value="">-- Tutte le posizioni --</option>';
            entries.forEach(e => {
                const posObj = allShelfPositions.find(p => p.code === e.positionCode);
                const desc = posObj?.description ? ` — ${posObj.description}` : '';
                posSel.innerHTML += `<option value="${e.positionCode}">${e.positionCode}${desc} (${e.quantity || 0} colli)</option>`;
            });
            // If only one position, auto-select it
            if (entries.length === 1) posSel.value = entries[0].positionCode;
        } else {
            // Show all positions to let them pick one
            posField.style.display = 'block';
            posSel.innerHTML = '<option value="">-- Seleziona posizione --</option>';
            allShelfPositions.forEach(p => {
                const desc = p.description ? ` — ${p.description}` : '';
                posSel.innerHTML += `<option value="${p.code}">${p.code}${desc}</option>`;
            });
        }

        // Reset fields
        document.getElementById('modalQty').value = 1;
        document.getElementById('modalLotto').value = '';
        document.getElementById('modalScadenza').value = '';
        document.getElementById('modalNote').value = '';
        updateKgPreview();

        document.getElementById('modalOverlay').classList.add('open');
    }

    function openModalFromShelf(entryId, type) {
        const entry = allShelfEntries.find(e => e.id === entryId);
        if (!entry) return;
        modalEntry = entry;
        modalArticle = allArticles.find(a => a.id === entry.articleId);
        if (!modalArticle) return;
        modalPosCode = entry.positionCode;
        setModalType(type);

        // Article info
        document.getElementById('modalArtName').textContent = modalArticle.name || '—';
        document.getElementById('modalArtCode').textContent = modalArticle.code || '—';
        const allEntries = allShelfEntries.filter(e => e.articleId === modalArticle.id);
        const totalQty = allEntries.reduce((s, e) => s + (e.quantity || 0), 0);
        document.getElementById('modalArtStock').textContent = totalQty;
        document.getElementById('modalArtKg').textContent = calcKg(totalQty, modalArticle);

        // Position info
        document.getElementById('modalPosInfo').style.display = 'block';
        document.getElementById('modalPosCode').textContent = entry.positionCode;
        document.getElementById('modalPosQty').textContent = entry.quantity || 0;

        // Hide position select (already determined)
        document.getElementById('modalPosSelectField').style.display = 'none';

        // Pre-fill lotto if exists
        document.getElementById('modalQty').value = 1;
        document.getElementById('modalLotto').value = entry.batch || '';
        document.getElementById('modalScadenza').value = '';
        document.getElementById('modalNote').value = '';
        updateKgPreview();

        document.getElementById('modalOverlay').classList.add('open');
    }

    function setModalType(type) {
        modalType = type;
        const btnC = document.getElementById('btnModCarico');
        const btnS = document.getElementById('btnModScarico');
        const lbl = document.getElementById('lblQty');
        const title = document.getElementById('modalTitle');
        const confirm = document.getElementById('modalConfirmBtn');
        const extra = document.getElementById('modalExtraFields');

        if (type === 'CARICO') {
            btnC.className = 'type-btn active-carico';
            btnS.className = 'type-btn';
            lbl.textContent = 'Quantità da caricare (colli)';
            title.textContent = '📥 Carico Merce';
            confirm.textContent = '✓ Conferma Carico';
            confirm.className = 'btn btn-success';
            extra.style.display = '';
        } else {
            btnS.className = 'type-btn active-scarico';
            btnC.className = 'type-btn';
            lbl.textContent = 'Quantità da scaricare (colli)';
            title.textContent = '📤 Scarico Merce';
            confirm.textContent = '✓ Conferma Scarico';
            confirm.className = 'btn btn-danger';
            extra.style.display = 'none';
        }
    }

    function modQty(delta) {
        const inp = document.getElementById('modalQty');
        const next = Math.max(0, (parseInt(inp.value) || 0) + delta);
        inp.value = next;
        updateKgPreview();
    }

    function updateKgPreview() {
        const qty = parseInt(document.getElementById('modalQty').value) || 0;
        const el = document.getElementById('kgPreview');
        if (!modalArticle || qty <= 0) { el.textContent = ''; return; }
        el.textContent = `= ${calcKg(qty, modalArticle)} kg`;
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('open');
    }

    function closeModalOverlay(e) {
        if (e.target === document.getElementById('modalOverlay')) closeModal();
    }

    async function submitModal() {
        if (!modalArticle) return;
        const qty = parseInt(document.getElementById('modalQty').value);
        if (!qty || qty <= 0) {
            showToast('❌ Inserisci una quantità valida', 'error');
            return;
        }

        // Determine target position
        let targetPosCode = modalPosCode;
        if (!targetPosCode) {
            targetPosCode = document.getElementById('modalPosSelect')?.value || null;
        }

        const note = document.getElementById('modalNote').value.trim();
        const lotto = document.getElementById('modalLotto').value.trim();
        const scadenza = document.getElementById('modalScadenza').value;

        const btn = document.getElementById('modalConfirmBtn');
        btn.disabled = true;
        const origText = btn.textContent;
        btn.textContent = '⏳ Salvataggio...';

        try {
            // Strategy: If we have a specific shelf entry or position, update shelf entry.
            // Otherwise update stock on the article level.

            if (targetPosCode) {
                // Find existing shelf entry for this article+position
                let entry = allShelfEntries.find(e =>
                    e.articleId === modalArticle.id && e.positionCode === targetPosCode
                );

                if (entry) {
                    // Update existing entry quantity
                    let newQty;
                    if (modalType === 'CARICO') {
                        newQty = (entry.quantity || 0) + qty;
                    } else {
                        newQty = (entry.quantity || 0) - qty;
                        if (newQty < 0) {
                            showToast(`❌ Quantità insufficiente! Disponibili: ${entry.quantity} colli`, 'error');
                            return;
                        }
                    }

                    const resp = await fetch(`${API_URL}/inventory/shelf-entries/${entry.id}`, {
                        method: 'PUT',
                        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            quantity: newQty,
                            batch: lotto || entry.batch || null,
                            expiry: scadenza || entry.expiry || null,
                            notes: note || entry.notes || null,
                            positionCode: targetPosCode
                        })
                    });
                    if (!resp.ok) {
                        const err = await resp.json().catch(() => ({}));
                        throw new Error(err.error || `Errore HTTP ${resp.status}`);
                    }
                } else {
                    // Create new shelf entry
                    if (modalType === 'SCARICO') {
                        showToast('❌ Nessun prodotto in questa posizione da scaricare', 'error');
                        return;
                    }
                    const resp = await fetch(`${API_URL}/inventory/shelf-entries`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            articleId: modalArticle.id,
                            positionCode: targetPosCode,
                            quantity: qty,
                            batch: lotto || null,
                            expiry: scadenza || null,
                            notes: note || null
                        })
                    });
                    if (!resp.ok) {
                        const err = await resp.json().catch(() => ({}));
                        throw new Error(err.error || `Errore HTTP ${resp.status}`);
                    }
                }

                // Also update stock at article level for consistency
                const allEntries = allShelfEntries.filter(e => e.articleId === modalArticle.id);
                const currentStock = allEntries.reduce((s, e) => s + (e.quantity || 0), 0);
                let newStock;
                if (modalType === 'CARICO') {
                    newStock = currentStock + qty;
                } else {
                    newStock = currentStock - qty;
                }
                await fetch(`${API_URL}/inventory/stock/update`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        articleId: modalArticle.id,
                        newQuantity: Math.max(0, newStock),
                        reason: `${modalType} LITE - ${qty} colli${targetPosCode ? ' pos.' + targetPosCode : ''}${note ? ' - ' + note : ''}`
                    })
                }).catch(() => {});       // best-effort

            } else {
                // No position: just update article stock
                const entries = allShelfEntries.filter(e => e.articleId === modalArticle.id);
                const currentStock = entries.reduce((s, e) => s + (e.quantity || 0), 0);
                // Fallback to inventory field
                const invStock = parseInt(modalArticle.inventory?.currentStock ?? modalArticle.quantita ?? 0);
                const baseStock = Math.max(currentStock, invStock);
                let newStock;
                if (modalType === 'CARICO') {
                    newStock = baseStock + qty;
                } else {
                    newStock = baseStock - qty;
                    if (newStock < 0) {
                        showToast(`❌ Quantità insufficiente! Giacenza: ${baseStock} colli`, 'error');
                        return;
                    }
                }

                const resp = await fetch(`${API_URL}/inventory/stock/update`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        articleId: modalArticle.id,
                        newQuantity: newStock,
                        reason: `${modalType} LITE - ${qty} colli${note ? ' - ' + note : ''}`
                    })
                });
                if (!resp.ok) throw new Error('Errore nel salvataggio');
            }

            // Success
            const emoji = modalType === 'CARICO' ? '📥' : '📤';
            const kgMsg = calcKg(qty, modalArticle);
            showToast(`${emoji} ${modalType}: ${qty} colli (${kgMsg} kg) — ${modalArticle.name}`, 'success');

            // Add to local history
            recentMovements.unshift({
                type: modalType,
                articleName: modalArticle.name || '—',
                qty,
                position: targetPosCode || '',
                note: note || '',
                time: new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' })
            });
            // Keep max 50
            if (recentMovements.length > 50) recentMovements.length = 50;

            closeModal();
            await loadAll();

        } catch (e) {
            showToast(`❌ ${e.message}`, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = origText;
        }
    }

    // ===== TOAST =====
    function showToast(msg, type) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = `toast ${type || ''} show`;
        clearTimeout(el._timer);
        el._timer = setTimeout(() => { el.classList.remove('show'); }, 3500);
    }

    // ===== KEYBOARD =====
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal();
        if (e.key === 'Enter' && !['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement?.tagName)) {
            const overlay = document.getElementById('modalOverlay');
            if (overlay.classList.contains('open')) {
                const btn = document.getElementById('modalConfirmBtn');
                if (btn && !btn.disabled) { e.preventDefault(); btn.click(); }
            }
        }
    });
    </script>
    <script src="js/ui-confirm.js"></script>
</body>
